paper_concepts:
  - concept: Basis and coordinates for function decomposition
    classification: in_graph
    matched_node_id: math.linear_algebra.basis_and_coordinates
    role_in_paper: The whole paper starts from expanding an unknown function in a finite basis with rational coefficients.
  - concept: Feynman integrals as loop-momentum integrals
    classification: in_graph
    matched_node_id: qft.loop_momentum_integration_structure
    role_in_paper: This is the object being sampled numerically and then reconstructed analytically.
  - concept: Feynman propagator
    classification: in_graph
    matched_node_id: qft.feynman_propagator
    role_in_paper: The generic loop integral formula and all diagram examples are built from propagator denominators.
  - concept: Feynman rules
    classification: in_graph
    matched_node_id: qft.feynman_rules
    role_in_paper: The paper explicitly ties the singularity structure of integrals to the singularities of Feynman rules.
  - concept: Dimensional regularization
    classification: in_graph
    matched_node_id: qft.dimensional_regularization
    role_in_paper: Divergent integrals are regulated in d = 4 - 2 epsilon and fit order by order in the epsilon expansion.
  - concept: Ultraviolet divergence
    classification: in_graph
    matched_node_id: qft.ultraviolet_divergence
    role_in_paper: UV divergences are one of the reasons the integrals must be regulated before high-precision evaluation.
  - concept: Infrared divergence
    classification: in_graph
    matched_node_id: qft.infrared_divergence
    role_in_paper: IR divergences are the other major source of singular behavior that motivates epsilon expansion methods.
  - concept: Analytic continuation in kinematic invariants
    classification: in_graph
    matched_node_id: qft.analytic_continuation_in_kinematic_invariants
    role_in_paper: The examples are sampled in real Euclidean regions and then related back to physical regions by continuation.
  - concept: Branch cuts and Riemann sheets
    classification: in_graph
    matched_node_id: complex_analysis.branch_cut_and_riemann_sheet
    role_in_paper: Branch-cut structure constrains symbol letters, basis choice, and the need for branch-cut-compatible functions.
  - concept: Landau singularity conditions
    classification: in_graph
    matched_node_id: qft.landau_singularity_conditions
    role_in_paper: Landau analysis is the main source of the alphabets and singularity constraints used to build the basis.
  - concept: Landau analytic structure
    classification: in_graph
    matched_node_id: qft.landau_analytic_structure
    role_in_paper: The broader analytic-structure viewpoint motivates both the bootstrap inputs and the paper's bottom-up strategy.
  - concept: Mandelstam variables
    classification: in_graph
    matched_node_id: qft.mandelstam_variables
    role_in_paper: Several examples are parameterized in terms of s, t, and u before changing to more convenient variables.
  - concept: On-shell kinematics
    classification: in_graph
    matched_node_id: qft.on_shell
    role_in_paper: The two-loop four-point examples use adjacent external legs that are on shell, which shapes the alphabet and basis.
  - concept: Iterated integrals
    classification: in_graph
    matched_node_id: qft.iterated_integral
    role_in_paper: GPLs are iterated integrals, and the double-box example also uses numerical iterated integrals directly as basis functions.
  - concept: Symbol formalism
    classification: in_graph
    matched_node_id: qft.symbol_calculus
    role_in_paper: The paper uses symbols to enumerate function spaces, impose integrability, and organize basis construction.
  - concept: Algebraic symbol letters from singularities
    classification: in_graph
    matched_node_id: technique.algebraic_letter_construction
    role_in_paper: SOFIA-derived letters are the basic input from which symbol spaces and GPL bases are built.
  - concept: Integrability constraints on symbol letters
    classification: in_graph
    matched_node_id: technique.integrability_product_constraints
    role_in_paper: Only integrable symbols correspond to actual functions, so these constraints are central to basis generation.
  - concept: Alpha-positivity constraints
    classification: in_graph
    matched_node_id: technique.alpha_positivity_constraints
    role_in_paper: These constraints are part of the symbol-level pruning used to make the outer-mass double-box fit tractable.
  - concept: Genealogical constraints
    classification: in_graph
    matched_node_id: technique.genealogical_constraints
    role_in_paper: These extra symbol constraints are one of the ways the paper shrinks an otherwise impossible basis.
  - concept: Landau bootstrap
    classification: in_graph
    matched_node_id: technique.landau_bootstrap
