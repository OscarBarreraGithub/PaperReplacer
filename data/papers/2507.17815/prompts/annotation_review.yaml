gaps:
- concept: Symbol formalism
  source_analysis_concept: Symbol formalism
  why_needed: The paper builds bases by enumerating symbols first and only then integrating
    them into functions.
  suggested_explanation: 'The symbol of a polylogarithmic function is a tensor-like
    record of the ordered logarithmic letters that appear under repeated differentiation.
    It throws away additive constants such as zeta values and powers of pi, but it
    keeps the combinatorial structure that controls functional identities, branch
    cuts, and integrability. Because of that, symbols are much easier to enumerate
    and constrain than full GPL formulas. In this paper the authors first build spaces
    of allowed symbols, prune them with integrability and singularity information,
    and only later integrate the survivors back into actual functions. So the symbol
    is not just notation here; it is the working representation in which the candidate
    basis is constructed.


    Connection to Landau singularities and symbol alphabets. You already know how
    Landau analysis supplies the alphabet of allowed letters. The symbol is the next
    layer up: it records ordered strings of those letters and therefore tracks how
    the function can branch as one moves across singular loci. If the alphabet tells
    you which letters are allowed, the symbol tells you which words the paper is allowed
    to spell with them. That is why Appendix B sits so close to the Landau-bootstrap
    logic you already recognize.'
  context_snippet: Encoding polylogarithmic functions by tensors that expose algebraic
    identities and branch-cut structure.
