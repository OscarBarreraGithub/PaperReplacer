- concept: Differential equations for master integrals
  explanation: Master integrals satisfy coupled differential equations in kinematic
    variables or auxiliary parameters, and solving those equations is one of the main
    modern ways to evaluate them. The paper's whole numerical input pipeline depends
    on this idea, so the reader needs it to understand where the high-precision sample
    values come from.
