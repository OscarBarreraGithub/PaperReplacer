- concept: Auxiliary-mass flow / AMFlow-style evaluation
  source_analysis_concept: ''
  why_needed: The paper uses AMFlow repeatedly as the concrete source of high-precision
    sample values.
  suggested_explanation: 'AMFlow is a modern numerical pipeline for Feynman integrals
    that avoids direct high-dimensional integration. It introduces an auxiliary mass
    parameter, uses IBP identities to derive differential equations in that parameter,
    and starts from a boundary point where the integral becomes simpler, typically
    the large-mass limit. Solving that flow back to the physical point produces coefficients
    of the epsilon expansion to very high precision. In this paper those high-precision
    values are not the final answer; they are the data that analytic regression will
    later fit exactly. Without this picture, the source of the paper''s trusted numerical
    samples stays opaque.


    Connection to High-precision numerical evaluation. You already know why hundreds
    of reliable digits matter when one wants exact rational reconstruction rather
    than a floating-point approximation. AMFlow is the machine that manufactures those
    digits for a regulated Feynman integral while respecting its singular structure.
    Conceptually, it plays the role of a precision-preserving oracle: lattice reduction
    is the recovery step, but AMFlow is what makes the sampled numbers good enough
    for that recovery to succeed.'
  context_snippet: Introducing an auxiliary mass and evolving differential equations
    from a simple boundary condition to the desired integral.
  related_graph_nodes:
