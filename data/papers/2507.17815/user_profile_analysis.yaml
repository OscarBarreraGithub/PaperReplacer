  pedagogical_explanation: 'A loop integral starts as an integral over loop momenta
    with many propagator denominators. Feynman parametrization combines those denominators
    into one denominator and trades the loop-momentum integrals for auxiliary parameters,
    while the Baikov representation uses inverse propagators and scalar products themselves
    as integration variables. Both rewritings expose where the singular regions and
    algebraic polynomials live, which is why they are standard starting points for
    direct numerical integration. In this paper the authors mention them to explain
    the naive route to numerical evaluation. After either rewrite, one still faces
    a genuinely multidimensional integral, so reaching the precision needed for exact
    reconstruction is usually expensive.


