novel_contributions:
- contribution: Multi-point lattice reduction for analytic regression of Feynman integrals
  matched_node_id: technique.lattice_reduction_analytic_regression
  description: The paper generalizes the old use of integer-relation methods for fitting
    constants into a method for fitting full functions. It does this by building a
    lattice from values of the target integral and the basis functions at many kinematic
    points, then reading exact rational coefficients from the reduced lattice basis.
- contribution: Precision-versus-datapoint tradeoff law for analytic fitting
  matched_node_id: technique.precision_point_tradeoff
  description: The paper's main scaling claim is that one can trade arithmetic precision
    for more evaluation points, with an estimated threshold d_min approximately proportional
    to n/p up to a plateau offset. This turns the practical question from Can I get
    ten thousand digits at one point? into Can I get moderate precision at many points?
- contribution: Bottom-up complement to the Landau bootstrap
  matched_node_id: technique.landau_bootstrap_complement
  description: Rather than trying to determine the answer from analytic structure
    alone, the paper uses analytic structure to define the function space and high-precision
    numerics to determine the coefficients. This is a clean conceptual reframing of
    analytic reconstruction as a bottom-up partner to the top-down bootstrap.
- contribution: Condition-number-guided point selection
  matched_node_id: null
  description: The paper shows that one can optimize sample points by minimizing the
    condition number of the basis matrix, using only the basis functions and not the
    expensive target integral. That turns point selection into a precomputation step
    and gives a principled way to reduce the required number of digits.
- contribution: Precision plateau in multi-point analytic regression
  matched_node_id: null
  description: 'The paper identifies a real saturation phenomenon: adding more random
    points does not keep reducing the required digits forever. It ties that plateau
    to the conditioning of smooth-function evaluation matrices, which is a nontrivial
    practical insight for anyone attempting large fits.'
- contribution: Numerical iterated-integral basis for regression
  matched_node_id: null
  description: In the outer-mass double-box example, the paper shows that explicitly
    integrated GPL basis functions are not always the most practical representation.
    A basis defined only by numerical iterated integrals can be cheaper, better conditioned,
    and still sufficient for exact coefficient recovery.
- contribution: End-to-end exact recovery of multi-loop integral families
  matched_node_id: null
  description: The paper does not stop at toy numerics; it reconstructs nontrivial
    one-loop, two-loop, and three-loop examples, including triangle ladders and the
    outer-mass double box. That makes the contribution methodological and operational,
    not just conceptual.
- contribution: Scaling comparison of lattice reduction, matrix inversion, and PSLQ
  matched_node_id: null
  description: The paper gives a practical timing and scaling comparison among the
    three main exact-fitting strategies available in this setting. The result is not
    merely that lattice reduction works, but that it occupies the useful regime where
    rational structure matters and many moderate-precision samples are available.
