    they are alternate coordinate systems for the same regulated Feynman integral.
    If you think of the integral you already know as the fixed object, then parametrization
    is just a change of variables that makes some structures more visible and some
    computations easier. That perspective is why the paper can compare direct multidimensional
    integration with DE-based methods without changing the physics problem itself.'
