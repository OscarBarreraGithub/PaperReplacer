paper_concepts:
- concept: Basis and coordinates for function decomposition
  classification: in_graph
  matched_node_id: math.linear_algebra.basis_and_coordinates
  role_in_paper: The whole paper starts from expanding an unknown function in a finite
    basis with rational coefficients.
- concept: Feynman integrals as loop-momentum integrals
  classification: in_graph
  matched_node_id: qft.loop_momentum_integration_structure
  role_in_paper: This is the object being sampled numerically and then reconstructed
    analytically.
- concept: Feynman propagator
  classification: in_graph
  matched_node_id: qft.feynman_propagator
  role_in_paper: The generic loop integral formula and all diagram examples are built
    from propagator denominators.
- concept: Feynman rules
  classification: in_graph
  matched_node_id: qft.feynman_rules
  role_in_paper: The paper explicitly ties the singularity structure of integrals
    to the singularities of Feynman rules.
- concept: Dimensional regularization
  classification: in_graph
  matched_node_id: qft.dimensional_regularization
  role_in_paper: Divergent integrals are regulated in d = 4 - 2 epsilon and fit order
    by order in the epsilon expansion.
- concept: Ultraviolet divergence
  classification: in_graph
  matched_node_id: qft.ultraviolet_divergence
  role_in_paper: UV divergences are one of the reasons the integrals must be regulated
    before high-precision evaluation.
- concept: Infrared divergence
  classification: in_graph
  matched_node_id: qft.infrared_divergence
  role_in_paper: IR divergences are the other major source of singular behavior that
    motivates epsilon expansion methods.
- concept: Analytic continuation in kinematic invariants
  classification: in_graph
  matched_node_id: qft.analytic_continuation_in_kinematic_invariants
  role_in_paper: The examples are sampled in real Euclidean regions and then related
    back to physical regions by continuation.
- concept: Branch cuts and Riemann sheets
  classification: in_graph
  matched_node_id: complex_analysis.branch_cut_and_riemann_sheet
  role_in_paper: Branch-cut structure constrains symbol letters, basis choice, and
    the need for branch-cut-compatible functions.
- concept: Landau singularity conditions
  classification: in_graph
  matched_node_id: qft.landau_singularity_conditions
  role_in_paper: Landau analysis is the main source of the alphabets and singularity
    constraints used to build the basis.
- concept: Landau analytic structure
  classification: in_graph
  matched_node_id: qft.landau_analytic_structure
  role_in_paper: The broader analytic-structure viewpoint motivates both the bootstrap
    inputs and the paper's bottom-up strategy.
- concept: Mandelstam variables
  classification: in_graph
  matched_node_id: qft.mandelstam_variables
  role_in_paper: Several examples are parameterized in terms of s, t, and u before
    changing to more convenient variables.
- concept: On-shell kinematics
  classification: in_graph
  matched_node_id: qft.on_shell
  role_in_paper: The two-loop four-point examples use adjacent external legs that
    are on shell, which shapes the alphabet and basis.
- concept: Iterated integrals
  classification: in_graph
  matched_node_id: qft.iterated_integral
  role_in_paper: GPLs are iterated integrals, and the double-box example also uses
    numerical iterated integrals directly as basis functions.
- concept: Symbol formalism
  classification: in_graph
  matched_node_id: qft.symbol_calculus
  role_in_paper: The paper uses symbols to enumerate function spaces, impose integrability,
    and organize basis construction.
- concept: Algebraic symbol letters from singularities
  classification: in_graph
  matched_node_id: technique.algebraic_letter_construction
  role_in_paper: SOFIA-derived letters are the basic input from which symbol spaces
    and GPL bases are built.
- concept: Integrability constraints on symbol letters
  classification: in_graph
  matched_node_id: technique.integrability_product_constraints
  role_in_paper: Only integrable symbols correspond to actual functions, so these
    constraints are central to basis generation.
- concept: Alpha-positivity constraints
  classification: in_graph
  matched_node_id: technique.alpha_positivity_constraints
  role_in_paper: These constraints are part of the symbol-level pruning used to make
    the outer-mass double-box fit tractable.
- concept: Genealogical constraints
  classification: in_graph
  matched_node_id: technique.genealogical_constraints
  role_in_paper: These extra symbol constraints are one of the ways the paper shrinks
    an otherwise impossible basis.
- concept: Landau bootstrap
  classification: in_graph
  matched_node_id: technique.landau_bootstrap
  role_in_paper: The paper treats its analytic-regression program as a complement
    to the top-down Landau-bootstrap program.
- concept: Conformal maps and rationalizing variable changes
  classification: in_graph
  matched_node_id: complex_analysis.conformal_map
  role_in_paper: Variables such as x, z, zbar, w, and z are chosen to rationalize
    square roots and simplify alphabets.
- concept: Analytic regression versus ordinary symbolic regression
  classification: gap
  matched_node_id: null
  role_in_paper: The introduction depends on this distinction to explain why approximate
    expression search is not enough here.
- concept: Sector decomposition
  classification: gap
  matched_node_id: null
  role_in_paper: It appears as the standard way to separate singular regions before
    the paper pivots to DE-based numerics.
- concept: Integration-by-parts reduction and master integrals
  classification: gap
  matched_node_id: null
  role_in_paper: The numerical pipeline assumes that large integral families can be
    reduced to a finite master basis.
- concept: Differential equations for master integrals
  classification: gap
  matched_node_id: null
  role_in_paper: AMFlow-style numerical evaluation relies on solving differential
    equations rather than directly integrating many variables.
- concept: Auxiliary-mass flow method
  classification: gap
  matched_node_id: null
  role_in_paper: This is the specific DE-based numerical mechanism the paper uses
    to obtain high-precision samples.
- concept: Feynman-parameter and Baikov representations
  classification: gap
  matched_node_id: null
  role_in_paper: The paper mentions them as the natural but ultimately less powerful
    naive integration variables.
- concept: Generalized polylogarithms
  classification: gap
  matched_node_id: null
  role_in_paper: They are the main function space in which the paper assumes the answers
    live.
- concept: Classical polylogarithms
  classification: gap
  matched_node_id: null
  role_in_paper: The simplest examples are written explicitly in logs and Li_n functions
    rather than abstract GPL notation.
- concept: Elliptic polylogarithms
  classification: gap
  matched_node_id: null
  role_in_paper: The paper uses them as the natural next class beyond GPLs for future
    extensions.
- concept: Transcendental weight and uniform transcendentality
  classification: gap
  matched_node_id: null
  role_in_paper: Weight counting controls basis construction, epsilon-order expectations,
    and several important basis reductions.
- concept: Maximal cuts, leading singularities, and algebraic prefactors
  classification: gap
  matched_node_id: null
  role_in_paper: The paper repeatedly separates a rational or algebraic prefactor
    from a pure transcendental function before fitting.
- concept: Euclidean region and continuation to physical kinematics
  classification: gap
  matched_node_id: null
  role_in_paper: Real-valued sampling regions are chosen deliberately to improve the
    numerical stability of the fits.
- concept: Multiple zeta values and pi-valued beyond-symbol terms
  classification: gap
  matched_node_id: null
  role_in_paper: The paper has to enlarge symbol-derived bases by these symbol-invisible
    constants to make them complete.
- concept: Shuffle product plus tangential-base-point/trailing-zero regularization
  classification: gap
  matched_node_id: null
  role_in_paper: Appendix C depends on these ideas to make numerical iterated integrals
    well defined at endpoints.
- concept: Galois-even symmetry and physical logarithmic branch cuts
  classification: gap
  matched_node_id: null
  role_in_paper: These constraints are crucial for the outer-mass double-box symbol
    pruning but are not represented explicitly in the graph.
- concept: Principal Landau determinants
  classification: gap
  matched_node_id: null
  role_in_paper: They are presented as an automated route from singularity analysis
    to an alphabet of candidate letters.
- concept: Condition number and singular values
  classification: gap
  matched_node_id: null
  role_in_paper: The scaling section uses them to explain when and why precision requirements
    blow up.
- concept: Matrix inversion and least-squares fitting
  classification: gap
  matched_node_id: null
  role_in_paper: These are the main alternative regressors against which lattice reduction
    is judged.
- concept: 'Lattice-reduction basics: LLL, L^2, shortest vector, Lovasz condition'
  classification: gap
  matched_node_id: null
  role_in_paper: The main method depends on this lattice-theory background, especially
    the appendix and the construction of the integer lattice.
- concept: PSLQ algorithm
  classification: gap
  matched_node_id: null
  role_in_paper: PSLQ is the standard single-point integer-relation baseline that
    the paper repeatedly compares against.
- concept: Multi-point lattice reduction for analytic regression of Feynman integrals
  classification: novel
  matched_node_id: technique.lattice_reduction_analytic_regression
  role_in_paper: This is the paper's central methodological contribution, extending
    integer-relation fitting from numbers to sampled functions.
- concept: Precision-versus-datapoint tradeoff law for analytic fitting
  classification: novel
  matched_node_id: technique.precision_point_tradeoff
  role_in_paper: The paper argues and demonstrates that more sampling points can substitute
    for higher arithmetic precision.
- concept: Bottom-up complement to the Landau bootstrap
  classification: novel
  matched_node_id: technique.landau_bootstrap_complement
  role_in_paper: The paper frames its workflow as a systematic partner to top-down
    bootstrap constraints rather than as a replacement.
- concept: Condition-number-guided point selection
  classification: novel
  matched_node_id: null
  role_in_paper: The paper proposes optimizing sample points using the basis alone,
    without evaluating the target integral first.
- concept: Precision plateau in multi-point analytic regression
  classification: novel
  matched_node_id: null
  role_in_paper: The scaling study identifies and explains the saturation of d_min
    even when more points are added.
- concept: Numerical iterated-integral basis for regression
  classification: novel
  matched_node_id: null
  role_in_paper: The double-box example shows that a purely numerical basis can outperform
    an explicit GPL basis in practice.
- concept: End-to-end exact recovery of multi-loop integral families
  classification: novel
  matched_node_id: null
  role_in_paper: The paper demonstrates complete analytic reconstruction for several
    nontrivial one-, two-, and three-loop examples.
- concept: Scaling comparison of lattice reduction, matrix inversion, and PSLQ
  classification: novel
  matched_node_id: null
  role_in_paper: The paper supplies a practical complexity analysis of the three competing
    regression strategies in the function-fitting regime.
gaps:
- concept: Symbol formalism
  source_analysis_concept: Symbol formalism
  why_needed: The paper builds bases by enumerating symbols first and only then integrating
    them into functions.
  suggested_explanation: 'The symbol of a polylogarithmic function is a tensor-like
    record of the ordered logarithmic letters that appear under repeated differentiation.
    It throws away additive constants such as zeta values and powers of pi, but it
    keeps the combinatorial structure that controls functional identities, branch
    cuts, and integrability. Because of that, symbols are much easier to enumerate
    and constrain than full GPL formulas. In this paper the authors first build spaces
    of allowed symbols, prune them with integrability and singularity information,
    and only later integrate the survivors back into actual functions. So the symbol
    is not just notation here; it is the working representation in which the candidate
    basis is constructed.


    Connection to Landau singularities and symbol alphabets. You already know how
    Landau analysis supplies the alphabet of allowed letters. The symbol is the next
    layer up: it records ordered strings of those letters and therefore tracks how
    the function can branch as one moves across singular loci. If the alphabet tells
    you which letters are allowed, the symbol tells you which words the paper is allowed
    to spell with them. That is why Appendix B sits so close to the Landau-bootstrap
    logic you already recognize.'
  context_snippet: Encoding polylogarithmic functions by tensors that expose algebraic
    identities and branch-cut structure.
