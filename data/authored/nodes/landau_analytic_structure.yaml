- id: complex_analysis.branch_cut_and_riemann_sheet
  label: Branch cut and Riemann sheet
  knowledge_kind: concept
  granularity_level: intermediate
  composite: false
  mastery_modes_supported:
    - recognize
    - use
  summary: The structure arising when a multi-valued function (e.g., log z) is made single-valued by placing a branch cut in the complex plane and restricting to one sheet of the covering Riemann surface. Required to understand threshold branch cuts in S-matrix elements and multi-sheet analytic structure of loop integrands.
  status: asserted
