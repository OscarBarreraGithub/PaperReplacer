  knowledge_kind: method
  granularity_level: intermediate
  composite: false
  mastery_modes_supported:
    - recognize
    - use
  summary: Define A_ji = 2 alpha_j.alpha_i / alpha_i^2 so each row gives the q_i-p_i integers for a simple root; diagonal entries are 2 and off-diagonal entries encode simple-root angles and relative lengths exactly as Dynkin data.
