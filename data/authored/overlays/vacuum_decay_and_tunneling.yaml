# ── Overlays for qft.bounce_solution ─────────────────────────────────────────

- overlay_type: assumed_background
  target_topic: qft.bounce_solution
  presumed_node: qft.instanton
  audience_profile: hep_th_grad
  subfield: nonperturbative_qft
  rationale: Papers on the bounce assume readers already know instantons and the Euclidean path-integral saddle-point logic; the bounce is introduced as a variant rather than as a new framework.
  status: asserted
  confidence: 0.95

- overlay_type: assumed_background
  target_topic: qft.bounce_solution
  presumed_node: qft.effective_potential
  audience_profile: hep_th_grad
  subfield: nonperturbative_qft
  rationale: The effective potential landscape is treated as given when setting up the bounce boundary-value problem; sources do not re-derive the effective potential before specifying the false/true vacuum positions.
  status: asserted
  confidence: 0.93

