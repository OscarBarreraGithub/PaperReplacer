# Berry phase assumed background
- overlay_type: assumed_background
  target_topic: qm.berry_phase
  presumed_node: qm.unitary_evolution
  audience_profile: hep_th_graduate
  subfield: topological_qft
  rationale: Students entering topological QFT (WZW terms, Chern-Simons, chiral anomaly) are expected to recognize the Berry phase; adiabatic theorem and unitary evolution are assumed without re-derivation.
  status: asserted
  confidence: 0.90

- overlay_type: assumed_background
  target_topic: qm.berry_phase
  presumed_node: qm.hilbert_space
  audience_profile: hep_th_graduate
  subfield: topological_qft
  rationale: The Berry phase is defined on parameter-space families of Hilbert-space states; Hilbert-space structure is assumed background for topological QFT students.
  status: asserted
  confidence: 0.92

- overlay_type: assumed_background
  target_topic: qm.berry_phase
  presumed_node: qm.eigenstate_and_eigenvalue
  audience_profile: hep_th_graduate
  subfield: topological_qft
  rationale: The adiabatic Berry phase is computed along a path of instantaneous eigenstates; the eigenstate/eigenvalue framework is assumed background.
  status: asserted
  confidence: 0.92

