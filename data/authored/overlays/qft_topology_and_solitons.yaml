# Canonical overlay annotations for the qft-topology-and-solitons batch.

# ── assumed background for the batch anchor ───────────────────────────────

- overlay_type: assumed_background
  target_topic: qft.topology_and_solitons
  presumed_node: qft.non_abelian_gauge_symmetry
  audience_profile: hep_th_grad
  subfield: qft_topology
  artifact_type: paper
  rationale: Papers on topology and solitons in QFT universally presume familiarity with non-Abelian gauge symmetry; the gauge structure is not re-derived when soliton classification is introduced.
  evidence:
    - type: expert_claim
      source_ref: weinberg_qft_vol2_triage
      note: Weinberg Vol II triage keeps non-Abelian gauge symmetry as assumed background for the soliton and topology branch.
  status: asserted
  confidence: 0.95

- overlay_type: assumed_background
  target_topic: qft.topology_and_solitons
  presumed_node: qft.yang_mills_action
  audience_profile: hep_th_grad
  subfield: qft_topology
  artifact_type: paper
  rationale: The Yang-Mills action and its finite-action boundary conditions are treated as prior knowledge in soliton papers; the energy functional and its classical equations of motion are invoked without re-derivation.
  evidence:
    - type: expert_claim
      source_ref: weinberg_qft_vol2_triage
      note: Triage keeps the Yang-Mills action as assumed upstream background for all extended-configuration analysis.
  status: asserted
  confidence: 0.92

- overlay_type: assumed_background
  target_topic: qft.topology_and_solitons
  presumed_node: qft.instanton
  audience_profile: hep_th_grad
  subfield: qft_topology
  artifact_type: paper
  rationale: The instanton is established in the nonperturbative_qcd_and_topology batch; papers on monopoles, skyrmions, and Chern-Simons terms frequently use instanton language and topological-sector vocabulary as assumed context.
