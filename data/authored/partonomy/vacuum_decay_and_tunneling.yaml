# Cross-branch partonomy: the bounce is also a subspecies of instanton-like Euclidean saddles.
- parent: qft.instanton
  child: qft.bounce_solution
  rationale: The bounce is a closely related Euclidean saddle to the instanton, distinguished by interpolating between non-degenerate (false and true) vacua rather than topologically distinct degenerate ones; placing it as a child of qft.instanton records this kinship.
  status: asserted
  confidence: 0.88
