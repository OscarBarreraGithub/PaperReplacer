- parent: qft.vacuum_decay_and_tunneling
  child: qft.false_vacuum_decay
  rationale: False vacuum decay is the physical phenomenon that the bounce solution computes; it is the principal payoff concept of the branch.
  status: asserted
  confidence: 0.97

- parent: qft.vacuum_decay_and_tunneling
  child: qft.electroweak_vacuum_stability
  rationale: Electroweak vacuum stability is the SM-facing phenomenological payoff of the vacuum-decay branch, connecting the abstract tunneling calculation to a concrete physical prediction about the universe.
