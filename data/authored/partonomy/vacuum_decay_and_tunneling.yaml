- parent: qft.topology_and_solitons
  child: qft.vacuum_decay_and_tunneling
  rationale: Vacuum decay and false-vacuum tunneling is a payoff branch of topological/nonperturbative QFT, sharing the Euclidean saddle-point methodology with instantons and solitons.
  status: asserted
  confidence: 0.92

# The three atomic nodes hang off the topic anchor.
- parent: qft.vacuum_decay_and_tunneling
  child: qft.bounce_solution
  rationale: The bounce is the central calculational object of the vacuum-decay branch; it is the Euclidean configuration whose action determines the leading tunneling exponent.
  status: asserted
