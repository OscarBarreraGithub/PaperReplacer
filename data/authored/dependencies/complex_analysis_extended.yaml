# ── Tier 0: CR equations → analytic function ──────────────────────────────────

- from: complex_analysis.cauchy_riemann_equations
  to: complex_analysis.analytic_function
  relation_type: requires_for_recognize
  necessity: necessary
  confidence: 0.95
  rationale: The Cauchy-Riemann equations are the practical criterion used to determine whether a function is holomorphic at a point; without them the concept of analytic function lacks an operational test.
  failure_mode_if_absent: Cannot verify whether a given function is holomorphic without checking the CR conditions; the concept remains non-operational.
  evidence:
    - type: expert_claim
      source_ref: complex_analysis_extended_initial
      note: Cannot verify whether a given function is holomorphic without checking the CR conditions; the concept remains non-operational.
  status: asserted

