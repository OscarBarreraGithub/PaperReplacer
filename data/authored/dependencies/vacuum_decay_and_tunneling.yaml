  relation_type: requires_for_recognize
  necessity: helpful
  audience_profile: hep_th_grad
  subfield: nonperturbative_qft
  task_type: conceptual_orientation
  rationale: False vacuum decay shares the semiclassical path-integral logic with instantons; prior exposure provides the conceptual scaffolding for understanding tunneling in QFT.
  failure_mode_if_absent: The relationship between Euclidean saddle points, tunneling amplitudes, and vacuum structure is opaque without the instanton template.
  evidence:
    - type: inferred
      source_ref: arXiv:1604.06090
      note: Pedagogical sections explicitly connect the bounce to the broader instanton literature.
  status: asserted
  confidence: 0.88

- from: qft.effective_potential
  to: qft.false_vacuum_decay
  relation_type: requires_for_recognize
  necessity: necessary
  audience_profile: hep_th_grad
  subfield: nonperturbative_qft
