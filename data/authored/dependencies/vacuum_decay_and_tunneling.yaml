# Canonical dependency edges for the vacuum_decay_and_tunneling batch.
# Source papers: arXiv:1604.06090, 1602.01102, 1707.08124 (Schwartz et al.)

# ── Prerequisites for qft.bounce_solution ────────────────────────────────────

- from: qft.instanton
  to: qft.bounce_solution
  relation_type: requires_for_recognize
  necessity: necessary
  audience_profile: hep_th_grad
  subfield: nonperturbative_qft
  task_type: conceptual_orientation
  rationale: The bounce is a species of Euclidean saddle-point; recognizing it requires knowing what instantons are and how finite-action Euclidean solutions dominate the path integral.
  failure_mode_if_absent: The bounce appears as an unmotivated mathematical object with no connection to the path-integral tunneling logic.
  evidence:
    - type: textual_evidence
      source_ref: arXiv:1604.06090
      note: Schwartz introduces the bounce by analogy with the instanton as the dominant Euclidean saddle.
    - type: textual_evidence
      source_ref: arXiv:1602.01102
      note: Direct-approach paper derives the bounce from path-integral tunneling using the same saddle-point logic as instantons.
  status: asserted
  confidence: 0.97

- from: qft.effective_potential
  to: qft.bounce_solution
  relation_type: requires_for_use
  necessity: necessary
  audience_profile: hep_th_grad
  subfield: nonperturbative_qft
  task_type: computation
  rationale: The bounce interpolates between minima of the potential; using it to compute tunneling rates requires specifying the effective potential landscape including quantum corrections.
  failure_mode_if_absent: Cannot specify the boundary conditions on the bounce or identify which field values define the false and true vacua.
  evidence:
    - type: textual_evidence
      source_ref: arXiv:1604.06090
      note: A central topic of the paper is whether to use the classical or the effective potential in bounce calculations.
  status: asserted
  confidence: 0.95

- from: qft.one_loop_effective_action
  to: qft.bounce_solution
  relation_type: requires_for_derive
  necessity: typical
  audience_profile: hep_th_grad
  subfield: nonperturbative_qft
  task_type: precision_calculation
  rationale: Precision tunneling rate calculations evaluate the one-loop fluctuation determinant around the bounce background, which is the core of the one-loop effective action formalism.
  failure_mode_if_absent: The tunneling rate is only known at leading exponential order; the pre-exponential factor from functional determinants cannot be computed.
  evidence:
    - type: textual_evidence
      source_ref: arXiv:1604.06090
      note: Paper is explicitly about precision decay rate calculations including one-loop functional determinants around the bounce.
    - type: textual_evidence
      source_ref: arXiv:1707.08124
      note: Provides exact closed-form functional determinants for scalars, fermions, and vectors around the scale-invariant bounce.
  status: asserted
  confidence: 0.96

# ── Prerequisites for qft.false_vacuum_decay ────────────────────────────────

- from: qft.bounce_solution
  to: qft.false_vacuum_decay
  relation_type: requires_for_use
  necessity: necessary
  audience_profile: hep_th_grad
  subfield: nonperturbative_qft
  task_type: computation
  rationale: The false vacuum decay rate is computed via the bounce; the exponential suppression factor B is the Euclidean action of the bounce solution.
  failure_mode_if_absent: There is no way to compute or estimate the tunneling rate without identifying the dominant saddle-point configuration.
  evidence:
    - type: textual_evidence
      source_ref: arXiv:1604.06090
      note: The entire computational framework is organized around the bounce as the object that determines the decay rate.
    - type: textual_evidence
      source_ref: arXiv:1602.01102
      note: Direct Minkowski path integral approach isolates a bounce-equivalent saddle as the dominant contribution.
  status: asserted
  confidence: 0.99

- from: qft.instanton
