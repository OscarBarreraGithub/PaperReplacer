- technique_id: adjoint_higgsing_scale_matching_bootstrap
  label: Adjoint-Higgsing bootstrap with scale matching
  description: Higgs larger product-group theories down to smaller ones by large adjoint vevs and use the induced matching
    of dynamical scales to bootstrap the general form of the curve. Use it to prove that the simplest ansatz is consistent
    under all decoupling flows.
  category: mathematical
  unlocks: Systematic construction of product-group curves for arbitrary ranks.
  prerequisites:
  - adjoint Higgsing
  - matching of dynamical scales
  - product-group gauge theories
  source_papers:
  - hep-th/9801108
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: adjoint_interpolation_between_models
  label: Adjoint interpolation between models
  description: Adding an adjoint field and moving along its vacuum expectation value interpolates between several known product-group
    models, exposing why their supersymmetry-breaking analyses look alike. This gives a constructive route for generating
    new DSB theories from old ones.
  category: physical
  unlocks: Produces families of related DSB models and clarifies their shared dynamics.
  prerequisites:
  - adjoint Higgsing
  - product-group decompositions
  - supersymmetric gauge dynamics
  source_papers:
