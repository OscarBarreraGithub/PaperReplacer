- technique_id: analytic_matching_of_accmm_to_hqe
  label: Analytic matching of ACCMM to the heavy-quark expansion
  description: Expand the spectator-model prediction away from the endpoint and compare it term by term with the heavy-quark
    expansion. Use it to identify which apparent model effects are actually compatible with HQE and which are artifacts.
  category: physical
  unlocks: A principled comparison between phenomenological spectator models and HQET-based inclusive decay theory.
  prerequisites: Inclusive semileptonic B decay, HQE, spectator-model kinematics.
