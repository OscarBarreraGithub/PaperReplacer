  mention_count: 1
  overlap_classification: new_distinct
- technique_id: ads_cft_wgc_translation
  label: Translation of WGC bounds into CFT data
  description: Map the WGC into an inequality relating operator dimension, charge, and current two-point coefficients in AdS/CFT.
    This provides a way to test a quantum-gravity conjecture using conformal data.
  category: mathematical
  unlocks: Checking WGC-like statements in holographic CFTs rather than directly in bulk gravity.
  prerequisites:
  - AdS/CFT dictionary
  - Central charges and current correlators
  - Operator-state correspondence
  source_papers:
