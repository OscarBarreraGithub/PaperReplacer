  category: physical
  unlocks: A direct resolution of why standard gravity does not require information to come out of the black hole in the Page-curve
    sense.
  prerequisites:
  - gravitational constraints
  - boundary Hamiltonian
  - AdS/CFT or asymptotic flatness
