- technique_id: annihilation_limited_nonthermal_relic_estimate
  label: Annihilation-limited estimate for non-thermal relic abundance
  description: When reheating occurs below the usual decoupling temperature, estimate the surviving Wino density from the
    condition n_chi ~ 3 Gamma_phi /(2 <sigma v>) rather than from thermal equilibrium. This gives a simple analytic ceiling
    on the relic abundance that is largely independent of production details.
  category: mathematical
  unlocks: Quickly determining whether late modulus decay overcloses the Universe or yields acceptable Wino dark matter.
  prerequisites:
