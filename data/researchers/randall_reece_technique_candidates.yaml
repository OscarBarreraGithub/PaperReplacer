- technique_id: autonomous_rescaling_of_frw_dynamics
  label: Autonomous rescaling of FRW scalar dynamics
  description: By rescaling the field and switching to logarithmic time the post-inflation equations become approximately
    autonomous and expose the attractor behavior of the condensate. This is the mathematical trick that makes the time evolution
    analytically transparent before numerical integration.
  category: mathematical
  unlocks: Simplifies complex scalar evolution in a time-dependent expanding background.
  prerequisites:
