- technique_id: anomaly_free_chiral_nb_extension
  label: Anomaly-Free Chiral U(1) Extension of Nelson-Barr
  description: Promote the heavy quarks to chiral matter under a new U(1)_X and add minimal extra fermions so the dangerous
    dimension-five operators are forbidden while the Nelson-Barr structure survives. This pushes the first harmful operators
    to dimension six and opens higher-scale cosmology.
  category: physical
  unlocks: A practical recipe for curing the Nelson-Barr quality problem without abandoning the mechanism's tree-level solution
    to strong CP.
  prerequisites:
  - Gauge anomaly cancellation
  - Charge-assignment engineering
  - Dimension-five versus dimension-six operator analysis
  source_papers:
