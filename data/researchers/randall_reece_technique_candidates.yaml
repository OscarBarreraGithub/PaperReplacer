techniques:
- technique_id: partially_interacting_subcomponent_dm
  label: Partially interacting dark matter as a subcomponent
  description: Assign strong self-interactions and dissipation only to a minority dark-matter component, leaving the dominant
    component cold and collisionless. This keeps the scenario consistent with large-scale and halo-shape constraints while
    allowing rich dark-sector structure.
  category: physical
  unlocks: Dark sectors with cooling, recombination, and disk formation that would otherwise be excluded if all dark matter
    interacted strongly.
  prerequisites:
  - self-interacting dark matter constraints
  - multi-component dark sectors
  - halo phenomenology
  source_papers:
  - '1303.1521'
  - '1303.3271'
  mention_count: 2
  overlap_classification: new_distinct
- technique_id: activation_map_kinematic_interpretation
  label: Activation-map kinematic interpretation
  description: Probe a trained classifier by constructing event populations that maximally excite it, then read off the kinematic
    structures those events share. Use when a network outperforms hand-built observables and you want the learned collider
    logic in human terms.
  category: physical
  unlocks: Human-readable discriminants for BSM signal-versus-background phase space
  prerequisites: Collider kinematics, supervised classification, feature-space interpretation
  source_papers:
  - '1804.09278'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: activation_maximization_gradient_ascent
  label: Activation maximization by gradient ascent
  description: Optimize directly in input space to synthesize events that strongly activate a chosen neuron or output. Use
    when you need a constructive map of what a neural network is looking for rather than only a ranking of features.
  category: mathematical
  unlocks: Direct visualization of the decision contours learned by a classifier
  prerequisites: Backpropagation, differentiable models, gradient-based optimization
  source_papers:
  - '1804.09278'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: adaptive_grid_reuse_for_decays
  label: Reuse adaptive phase-space grids for event decays
  description: The adaptive Vegas grids built during width calculation are stored and later reused to sample decay kinematics
    efficiently. Use it when many events must be decayed with the same matrix elements.
  category: mathematical
  unlocks: Turns expensive one-time integration into fast repeated event decay generation.
