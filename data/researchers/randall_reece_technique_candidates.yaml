- technique_id: analytic_continuation_superspace_duality_map
  label: Analytic continuation into superspace across Seiberg duality
  description: Promote couplings and scales to superspace spurions, use anomalous axial symmetries and holomorphy, and map
    electric soft terms into magnetic Kahler and superpotential terms. This gives explicit formulas for composite soft masses
    and shows why they vanish at F = 3N/2.
  category: mathematical
  unlocks: Calculable transmission of SUSY breaking through strongly coupled dualities rather than hand-waving about compositeness.
  prerequisites:
  - superspace spurions
  - holomorphy
  - Kahler potential analysis
