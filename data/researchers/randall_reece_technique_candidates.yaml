- technique_id: analytic_bcft_black_hole_dictionary
  label: Analytic BCFT/black-hole dictionary
  description: Model a BCFT on a 2D black-hole background with an AdS3 black string plus a Karch-Randall brane, so both gravity
    and field-theory entanglement calculations stay analytic. Use it when you need a solvable higher-dimensional island/Page-curve
    toy model.
  category: physical
  unlocks: Fully analytic control of entanglement phases, island transitions, and Page-curve behavior in curved-background
    BCFTs.
  prerequisites:
  - AdS3/BCFT correspondence
  - Karch-Randall branes
  - black string geometry
  - entanglement entropy
  source_papers:
