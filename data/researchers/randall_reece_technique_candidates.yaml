- technique_id: asymmetric_dark_recombination
  label: Asymmetric recombination of dark atoms
  description: Treat XC bound-state formation in the presence of abundant X and X-bar as an asymmetric recombination problem
    rather than a symmetric one, so the residual free-C fraction is controlled by the available heavy-particle bath and not
    just by standard atomic equilibrium. This is the key step that determines whether the catalyst remains available at late
    times.
  category: physical
  unlocks: Predictions for when dissipative dynamics and dark-radiation coupling persist into structure formation.
  prerequisites:
  - bound-state formation
  - particle-antiparticle asymmetries
  - dark atomic physics
  source_papers:
  - '1702.05482'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: asymmetry_transfer_by_dynamic_mass_mixing
  label: Asymmetry Transfer by Dynamic Mass Mixing
  description: Transfer a visible-sector asymmetry to dark matter using mass mixing that exists only in the early universe
    rather than using explicit number-violating scattering operators. This greatly broadens the asymmetric-dark-matter model
    space.
  category: physical
  unlocks: Asymmetric dark matter models with fewer required dark-visible connector operators.
  prerequisites:
