  label: Approximate stop-to-higgsino branching formulas
  description: Use compact analytic formulas and limiting approximations for stop decays to neutral and charged higgsinos,
    instead of carrying the full model every time. This lets one scan signature space quickly while keeping the dominant topology
    right.
  category: mathematical
  unlocks: Mapping stop spectra to final-state composition in stealth SUSY.
