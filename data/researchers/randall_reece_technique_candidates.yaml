- technique_id: archived_lisa_search_with_ground_based_priors
  label: Archived LISA searches guided by ground-based priors
  description: Use ground-based detections to narrow the parameter volume for archival LISA matched filtering, lowering the
    effective low-frequency detection threshold. Use when a source is sub-threshold in standalone LISA data but well measured
    on the ground.
