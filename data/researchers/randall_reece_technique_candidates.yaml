  mention_count: 1
  overlap_classification: new_distinct
- technique_id: all_order_initial_condition_expansion
  label: All-order expansion in initial misalignment fluctuations
  description: Higher-order field perturbations are generated by repeatedly differentiating the background solution with respect
    to the initial misalignment, yielding a closed non-linear expansion. Use it when you need the isocurvature bispectrum
    or other non-Gaussian statistics without solving separate higher-order PDEs.
  category: mathematical
  unlocks: Provides non-Gaussian axion fluctuations and density perturbations directly from background dynamics.
  prerequisites: Perturbative expansion in initial data, non-linear field evolution, bispectrum calculations
  source_papers:
  - '2510.07371'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: almost_zero_mode_localization
  label: Localized gravity from an almost-zero-mode graviton
  description: Even when an AdS4 brane in AdS5 has no normalizable massless graviton, identify a very light bound state whose
    wavefunction is concentrated near the brane. This mode reproduces 4D gravity over a large range of scales before the full
    higher-dimensional structure is visible.
  category: physical
  unlocks: Recovering effective four-dimensional gravity in infinite-volume bulks that do not admit a true zero mode.
  prerequisites:
  - bound states in warped backgrounds
  - AdS4 branes
  - effective gravitational potential
  source_papers:
  - hep-th/0011156
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: alpha_beta_parameterization_of_gw_signal
  label: Alpha-beta parameterization of the GW signal
  description: Compress the phase transition into the latent-heat parameter alpha and inverse duration beta/H, then feed those
    into GW spectrum estimates. Use it when model details are secondary to detector-facing signal forecasts.
  category: mathematical
  unlocks: A simple bridge from radion-potential calculations to observable peak frequencies and amplitudes.
  prerequisites:
  - latent heat
  - bubble nucleation rate
  - stochastic GW spectrum formulas
  source_papers:
  - hep-ph/0607158
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: alpha_delta_phi_cut_strategy
  label: Alpha and Delta-Phi Cut Strategy
  description: Use alpha = pT2/mjj together with a small dijet delta-phi cut to isolate acoplanar dijets with invisible recoil
    and strongly reduce QCD backgrounds. The key is to exploit the non-back-to-back geometry caused by neutralinos.
  category: physical
  unlocks: Separating signal from QCD in simple two-jet final states.
  prerequisites:
  - Dijet kinematics
  - Azimuthal correlations
  - QCD backgrounds
  source_papers:
  - '0806.1049'
