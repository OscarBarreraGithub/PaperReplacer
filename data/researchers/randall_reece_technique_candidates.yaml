- technique_id: asymptotic_coefficient_suppression_analysis
  label: Asymptotic coefficient suppression analysis
  description: The infinite tower of higher-dimension charm operators is examined through the behavior of its coefficients,
    showing that numerical suppression makes the leading term dominant despite a marginal expansion parameter. This is the
    mathematical reason the correction remains small and usable.
  category: mathematical
  unlocks: Justifies truncating the charm-loop expansion after the first few operators.
  prerequisites:
  - asymptotic expansions
  - operator matching
  - matrix element scaling
  source_papers:
  - hep-ph/9702322
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: asymptotic_freedom_via_dilaton_potential
  label: Engineer asymptotic freedom through the dilaton potential
  description: The dilaton potential is chosen so that the holographic coupling reproduces logarithmic UV running instead
    of flowing to a conformal fixed point. Use it when a holographic QCD model must capture the qualitative UV behavior of
    QCD.
  category: physical
  unlocks: Removes the radion-like pathology of hard-wall models and ties condensate scales to QCD running.
  prerequisites: QCD beta function, dilaton-coupling dictionary, holographic RG flow
  source_papers:
