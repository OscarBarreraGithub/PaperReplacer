- technique_id: anisotropy_saturation_in_isotropization
  label: Account for anisotropy saturation in isotropization rates
  description: Track the evolution of the velocity anisotropy itself instead of equating the isotropization time to the time
    for an O(1) change in kinetic energy. As the small velocity component catches up, the transfer rate saturates and further
    isotropization slows dramatically.
  category: physical
  unlocks: More realistic relaxation bounds for self-interacting dark matter in halos and dwarfs.
  prerequisites:
  - velocity anisotropy in halos
  - relaxation-time calculations
