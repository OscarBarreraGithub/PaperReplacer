  mention_count: 1
  overlap_classification: new_distinct
- technique_id: anomaly_inflow_for_charged_axion_string_modes
  label: Anomaly Inflow for Charged Axion-String Modes
  description: Use the bulk theta term to show that axion strings must carry charged worldsheet modes that absorb the inflow.
    Those worldsheet excitations furnish the charged states needed by strong forms of the WGC.
  category: physical
  unlocks: Constructing explicit charged towers even when the four-dimensional particle spectrum does not make them obvious.
  prerequisites:
