- technique_id: anomaly_computation_triad
  label: Triangle, Spectral-Flow, and Fujikawa Anomaly Triad
  description: 'Compute chiral anomalies by three equivalent methods: spectral flow or Landau levels, triangle diagrams, or
    Fujikawa''s Jacobian for the path-integral measure. Switching among the three lets you pick the fastest route for the
    question at hand.'
  category: mathematical
  unlocks: Reliable anomaly calculations in settings ranging from perturbative amplitudes to topological and nonperturbative
