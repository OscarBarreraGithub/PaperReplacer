  mention_count: 1
  overlap_classification: new_distinct
- technique_id: all_mass_hierarchy_barr_zee_evaluation
  label: Full two-loop Barr-Zee evaluation for derivative axion couplings
  description: Evaluate the Barr-Zee contribution to the anomalous magnetic moment using the full loop functions rather than
    asymptotic limits tied to a special mass hierarchy. This is essential in the parameter region relevant for a possible
    muon g-2 explanation.
  category: mathematical
  unlocks: Reliable axion contributions to g-2 when common approximate formulas are numerically misleading.
  prerequisites:
  - two-loop Barr-Zee diagrams
  - loop integrals
  - anomalous magnetic moment calculations
  source_papers:
