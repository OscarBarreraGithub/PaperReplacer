- technique_id: adiabatic_entropy_rotation
  label: Adiabatic/entropy rotation
  description: Rotate the coupled radion-inflaton fluctuations into adiabatic and entropy directions aligned with the time-dependent
    background trajectory. Use it when identifying the sourced curvature mode in a multi-field background is otherwise opaque.
  category: mathematical
  unlocks: A clean separation of the observable scalar mode from the orthogonal isocurvature mode in the growing-fifth-dimension
    scenario.
