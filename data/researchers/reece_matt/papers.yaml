    phenomenological constraints, this argument implies that the Standard Model photon must be exactly massless. It also implies
    that much of the parameter space for light dark photons, which are the target of many experimental searches, is compatible
    only with Higgs and not Stückelberg mass terms. This significantly affects the experimental limits and cosmological histories
    of such theories. I explain various caveats and weak points of the arguments, including loopholes that could be targets
