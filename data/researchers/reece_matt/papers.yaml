  abstract: 'Many cosmological models rely on large couplings of axions to gauge fields. Examples include theories of magnetogenesis,
    inflation on a steep potential, chiral gravitational waves, and chromonatural inflation. Such theories require a mismatch
    between the axion field range and the mass scale appearing in the $ aF\tilde{F} $ coupling. This mismatch suggests an
    underlying monodromy, with the axion winding around its fundamental period a large number of times. We investigate the
    extent to which this integer can be explained as a product of smaller integers in a UV completion: in the parlance of
    our times, can the theory be “clockworked”? We argue that a clockwork construction producing a potential $ {\mu}^4 \cos
