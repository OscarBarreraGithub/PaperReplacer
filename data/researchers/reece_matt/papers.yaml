    the gluino, stop, and Higgsino are assumed to be lighter than other superpartners. Our simplified models exhibit novel
    decay patterns that differ significantly from topologies of the Minimal Supersymmetric Standard Model, with and without
    R-parity. We determine limits on stops and gluinos from searches at the 8 TeV LHC. Existing searches constitute a powerful
    probe of Stealth Supersymmetry gluinos with certain topologies. However, we identify simplified models where the gluino
