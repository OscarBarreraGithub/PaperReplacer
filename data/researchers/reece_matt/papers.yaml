  abstract: The Circular Electron Positron Collider (CEPC) is a large international scientific facility proposed by the Chinese
    particle physics community to explore the Higgs boson and provide critical tests of the underlying fundamental physics
    principles of the Standard Model that might reveal new physics. The CEPC, to be hosted in China in a circular underground
    tunnel of approximately 100 km in circumference, is designed to operate as a Higgs factory producing electron-positron
    collisions with a center-of-mass energy of 240 GeV. The collider will also operate at around 91.2 GeV, as a Z factory,
    and at the WW production threshold (around 160 GeV). The CEPC will produce close to one trillion Z bosons, 100 million
    W bosons and over one million Higgs bosons. The vast amount of bottom quarks, charm quarks and tau-leptons produced in
    the decays of the Z bosons also makes the CEPC an effective B-factory and tau-charm factory. The CEPC will have two interaction
    points where two large detectors will be located. This document is the second volume of the CEPC Conceptual Design Report
    (CDR). It presents the physics case for the CEPC, describes conceptual designs of possible detectors and their technological
    options, highlights the expected detector and physics performance, and discusses future plans for detector R&D and physics
    investigations. The final CEPC detectors will be proposed and built by international collaborations but they are likely
    to be composed of the detector technologies included in the conceptual designs described in this document. A separate
    volume, Volume I, recently released, describes the design of the CEPC accelerator complex, its associated civil engineering,
    and strategic alternative scenarios.
