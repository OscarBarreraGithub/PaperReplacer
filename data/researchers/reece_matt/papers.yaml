    new U(1) symmetry and the slightly lighter neutral state π0h decays to γγ and γZ. The symmetry structure of such a model
    explains the near degeneracy in masses needed for the resulting photons to have a linelike shape and the large observed
    flux. The tunable lifetime of the neutral state allows such models to go unseen at direct detection or collider experiments
    that can constrain most other explanations. However, nucleosynthesis constraints on the π0h lifetime fix a minimum necessary
    coupling between the new multiplet and the Standard Model. The spectrum is predicted to be not a line but a box with a
    width of order a few GeV, smaller than but on the order of the Fermi-LAT resolution.
