    the Planck scale. This tower can consist of low-spin states, as in Kaluza-Klein theory, or high-spin states, as with weakly-coupled
    strings. We provide a suggestive bottom-up argument based on the mild p-form WGC that, for any gauge theory coupled to
    a fundamental axion through a θF ∧ F term, the tower is a stringy one. The charge-carrying string states at or below the
