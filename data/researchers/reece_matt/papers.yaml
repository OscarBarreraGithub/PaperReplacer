  abstract: We investigate stringy excitations in Randall-Sundrum effective theories for electroweak symmetry breaking arising
    from embedding in string theory. RS is dual to a confining gauge theory, which we expect to have "QCD strings," or color
    flux tubes. Stringy constructions of RS-like theories allow us to investigate the mass of these string states, which typically
    grows with a small fractional power of the number of colors N of the dual gauge theory. There are two known strong constraints
    on N for RS-like theories. The first arises from demanding that the Standard Model gauge couplings do not have a Landau
    pole at low scales. The second arises from demanding that the first-order confining phase transition in the early universe
