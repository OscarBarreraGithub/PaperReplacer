    fine-tuning and, more importantly, vacuum stability. In particular, the case of stop loops producing an opposite-sign
    hGG vertex of the same size as the SM one is ruled out by a combination of vacuum decay bounds and Large Electron–Positron
    Collider (LEP) constraints. We also show that scenarios with a sign flip from loops of color octet charged scalars or
    new fermionic states are highly constrained.
