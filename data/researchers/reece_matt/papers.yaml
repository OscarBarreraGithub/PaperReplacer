  abstract: We discuss the physics of moduli (light scalar fields with Planck-suppressed couplings to matter) in the case
    of low-scale supersymmetry breaking such as gauge mediation. We argue that even if the mechanism of moduli stabilization
    is decoupled from the mechanism of SUSY breaking, moduli masses will generically be parametrically related to the gravitino
    mass once the cancellation of the cosmological constant is taken into account. For low- scale SUSY breaking, this implies
    that moduli fields are light, long-lived relics that will generically drive the universe into a matter-dominated phase,
    in contradiction to standard BBN. We discuss two scenarios for evading this problem. The first is to consider very tuned
