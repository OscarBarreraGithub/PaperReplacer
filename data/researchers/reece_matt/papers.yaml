    Lagrangian, but it might also be interpreted to mean that a new colored and charged particle runs in loops and reinforces
    the W-loop contribution to hFF, while also producing the opposite-sign hGG amplitude to that generated by integrating
    out the top. Due to a correlation in sign of the new physics amplitudes, when the SM hFF coupling is enhanced the hGG
    coupling is decreased. Thus, in order to not suppress the rate of h → WW and h → ZZ, which appear to be approximately
    SM-like, one would need the loop to ‘overshoot’, not only canceling the top contribution but producing an opposite-sign
