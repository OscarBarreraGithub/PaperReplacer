    It summarizes the physics case for the CEPC, details the Reference Detector's technical design and technological options,
    and highlights its expected performance, demonstrating that the detector meets its design goals. A cost estimate for the
    Reference Detector and future development plans are also presented. Also included are two additional detector concepts,
    ILD and IDEA, developed by the international community for future electron-positron colliders and candidates to equip
    the CEPC's second interaction point. The first TDR volume, published in 2023, details the design of the CEPC accelerator
