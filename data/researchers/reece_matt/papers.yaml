  abstract: 'In effective quantum field theory, a spin-1 vector boson can have a technically natural small mass that does
    not originate from the Higgs mechanism. For such theories, which may be written in Stückelberg form, there is no point
    in field space at which the mass is exactly zero. I argue that quantum gravity differs from, and constrains, effective
    field theory: arbitrarily small Stückelberg masses are forbidden. In particular, the limit in which the mass goes to zero
    lies at infinite distance in field space, and this distance is correlated with a tower of modes becoming light according
    to the Swampland Distance Conjecture. Application of Tower or Sublattice variants of the Weak Gravity Conjecture makes
    this statement more precise: for a spin-1 vector boson with coupling constant e and Stückelberg mass m, local quantum
