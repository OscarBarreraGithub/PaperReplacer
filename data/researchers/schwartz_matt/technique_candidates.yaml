- technique_id: eft_above_ewsb_for_fcnc
  label: EFT Above Electroweak Symmetry Breaking for Top FCNCs
  description: 'Write the effective Lagrangian for top FCNC decays (t->cZ, cGamma) using dimension-6 operators that respect
    the full SU(2)_L x U(1)_Y gauge symmetry before electroweak symmetry breaking, rather than writing operators directly
    for the broken-phase vertices. This introduces additional structure (e.g. relating tcZ to bWc vertices) and provides stronger,
    more model-independent constraints.

    '
  unlocks: 'Makes it possible to derive model-independent constraints on top FCNC decay rates from existing B-physics data
    that are stronger and more complete than those obtained from broken-phase effective Lagrangians, because SU(2)_L invariance
    links top-sector operators to well-measured bottom-sector processes.

    '
  prerequisites:
