- technique_id: engineering_actions_via_independence_breaking
  label: Engineering Desired Actions by Deforming Parameter Distributions
  description: 'Shows how to engineer a desired interaction term in the field theory action by deforming the neural network
    parameter distribution away from statistical independence. Adding a coupling lambda * phi^4 to the action corresponds
    to a specific correlated deformation of the parameter density. Locality and cluster decomposition can be achieved by making
    the independence breaking spatially dependent.

    '
  unlocks: 'Construction of neural network architectures that realize specific physical field theories (demonstrated for phi^4
    theory at infinite N), enabling novel computational approaches to lattice field theory that bypass Monte Carlo sampling.

    '
