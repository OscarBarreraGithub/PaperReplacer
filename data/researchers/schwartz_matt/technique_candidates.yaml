    and soft function S_T, each depending on a single characteristic scale (mu_h ~ Q, mu_j ~ sqrt(tau)*Q, mu_s ~ tau*Q). This
    separation into single-scale objects is what makes N3LL resummation possible where traditional methods stall at NLL.

    '
  unlocks: 'Resummation of the thrust distribution to N3LL accuracy, far beyond the NLL limit of traditional CTTW methods.
    Enables percent-level extraction of alpha_s from event shape data.

    '
  prerequisites:
  - Soft-Collinear Effective Theory (SCET) operator formalism
  - Wilson line definitions for soft and collinear sectors
  - Hemisphere mass decomposition of thrust
  - Hard, jet, and soft function definitions in SCET
  source_papers:
  - '0803.0342'
