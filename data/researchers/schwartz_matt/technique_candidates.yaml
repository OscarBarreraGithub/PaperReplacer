- technique_id: sudakov_shoulder_resummation
  label: Sudakov shoulder logarithm resummation
  description: 'Identify and resum large logarithms of the form alpha_s^n ln^{2n}(1/3 - rho) that appear at intermediate values
    of event-shape observables (thrust, heavy jet mass) where the allowed phase space boundary grows order-by-order. The logarithms
    arise from Sudakov enhancement of narrow-jet radiation in the light hemisphere, which kinematically constrains the heavy
    hemisphere mass. Factorize the cross section near the trijet configuration into a soft function and inclusive jet functions.

    '
  unlocks: 'Enables resummation of large logarithms at the Sudakov shoulder (rho ~ 1/3) for heavy jet mass, which are as important
    as threshold logarithms and can invalidate fixed-order perturbation theory in regions traditionally used for alpha_s extraction.

    '
  prerequisites:
  - Event shapes (thrust, heavy jet mass)
  - Sudakov form factors and soft/collinear factorization
  - Narrow-jet kinematics near symmetric trijet configuration
  - Renormalization group evolution
  source_papers:
