- technique_id: multi_scale_uncertainty_band
  label: Correlated and anti-correlated scale variation for multi-scale EFT uncertainty
  description: 'In the EFT approach, four scales (mu_h, mu_j, mu_s, mu_m) appear. Rather than varying each independently (which
    can lead to unphysical configurations like mu_j < mu_s), two coordinated variations are used: a correlated mode (mu_j
    -> c*sqrt(tau)*Q, mu_s -> c*tau*Q) probing overall scale, and an anti-correlated mode (mu_j^2 -> a*Q^2*tau, mu_s -> a*Q*tau)
    probing the ratio. This avoids unphysical hierarchies while spanning the uncertainty space.

    '
  unlocks: 'Reliable perturbative uncertainty estimates that respect the physical scale hierarchy inherent in the EFT. Enables
    meaningful comparison of theory uncertainty across different event shapes and between EFT and fixed-order approaches.

    '
  prerequisites:
