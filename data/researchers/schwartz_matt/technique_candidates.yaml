- technique_id: final_state_only_ir_cancellation
  label: IR divergence cancellation via final-state-only sum with forward scattering
  description: 'Proves that for a fixed initial state |a>, the cross section for |a> to go to anything is IR finite when the
    sum includes forward scattering (|b> = |a>). This follows directly from completeness and unitarity, and is stronger than
    the KLN theorem which requires summing over both initial and final states. The analogous result holds for a fixed final
    state summing over initial states.

    '
  unlocks: 'Avoiding the troublesome and physically obscure initial-state sums required by the KLN theorem. For practical
    calculations, one need only sum over final states (including forward scattering) to achieve IR finiteness, which is closer
    to what is done experimentally.

    '
  prerequisites:
