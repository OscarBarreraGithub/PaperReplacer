- technique_id: e_scaling_boost_limit
  label: e-scaling relation between Q=0 and Q=infinity substructure distributions
  description: 'Shows that up to NLL order, the Q -> infinity distribution of tau_21 is related to the Q=0 thrust distribution
    by a simple rescaling by Euler''s number e=2.718: d_sigma/d_tau_21|_{Q->inf} = (1/e) * d_sigma/d_tau(tau = tau_21/e).
    This arises from averaging log^n(tau * sin^2(theta/2)) over the helicity angle theta.

    '
  unlocks: 'Provides a quick analytic check and physical intuition for the relationship between rest-frame and highly-boosted
    substructure distributions, connecting two limits that are otherwise computed independently.

    '
  prerequisites:
  - thrust distribution at NLL or higher
  - helicity angle averaging
  - large-boost kinematics
  source_papers:
