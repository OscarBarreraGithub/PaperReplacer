- technique_id: colored_diagram_decomposition
  label: Colored-diagram decomposition (separating soft sensitivities)
  description: 'Algorithmically decompose any Feynman diagram into a sum of "colored diagrams" where each virtual line is
    classified as soft-sensitive (red) or soft-insensitive (blue). The decomposition proceeds by iteratively expanding around
    maximal soft-sensitive sets of virtual momenta, subtracting already-identified soft limits to prevent double-counting
    (analogous to the zero-bin subtraction in SCET).

    '
  unlocks: 'Converts a tangled multi-loop diagram into a sum of pieces whose IR structure is manifest line-by-line. This makes
    it possible to prove factorization at all loop orders without needing diagram-by-diagram matching. It also provides a
    clean separation of modes that underpins the reduced-diagram picture.

    '
