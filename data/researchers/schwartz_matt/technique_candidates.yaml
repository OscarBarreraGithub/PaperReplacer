- technique_id: lorentz_violating_photon_mass
  label: Lorentz-violating photon mass with preserved Coulomb force
  description: 'Add a spatial mass term m^2 A_i^2 to electromagnetism while keeping A_0 massless (m_0 = 0). This gives massive
    electromagnetic waves while preserving the static Coulomb force (not Yukawa). The key insight is to decompose the electric
    field into a Proca part (massive, Yukawa) and a scalar potential Phi whose Yukawa contribution exactly cancels the Proca
    Yukawa, leaving Coulomb.

    '
  unlocks: 'A consistent modification of electrodynamics with massive photons that evades the strongest experimental bounds
