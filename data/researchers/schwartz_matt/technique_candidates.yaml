- technique_id: finite_parts_from_matching
  label: Automatic incorporation of finite loop corrections through EFT matching
  description: 'In SCET, the finite (non-logarithmic) parts of one-loop corrections are automatically allocated to specific
    functions: the constant part of the hard matching coefficient c_H enters at scale Q, the jet function constant c_J at
    scale p, and the soft function constant c_S at scale q. When combined, these finite parts reproduce the total NLO cross
    section without any additional infrared regulation. This is shown explicitly: c_H + c_J + c_S reproduces the known K-factor.

    '
  unlocks: 'A systematic way to incorporate non-logarithmic corrections at each scale, ensuring consistency between the resummed
    result and fixed-order perturbation theory. This is the foundation of the matching procedure for event shapes.

    '
  prerequisites:
  - On-shell matching of QCD to SCET operators
  - One-loop quark form factor
