- technique_id: eikonal_jet_function_phase_space_removal
  label: Eikonal jet function subtraction for unrestricted phase-space factorization
  description: 'Remove the cone-size (R) and energy (Lambda) cutoffs from the factorized thrust distribution by convolving
    with eikonal jet functions -- Wilson-line matrix elements that capture exactly the soft-collinear overlap between the
    jet and soft sectors. The eikonal jet functions have no Sudakov double logs and their R dependence matches that of the
    restricted jet functions, allowing clean cancellation.

    '
  unlocks: 'Factorization formulas for event shapes (thrust, jet broadening, N-jettiness) with fully inclusive phase-space
    integrals and no spurious cutoff scales, completing the connection between QCD factorization and SCET.

    '
  prerequisites:
  - factorization for event shapes (hard/jet/soft functions)
