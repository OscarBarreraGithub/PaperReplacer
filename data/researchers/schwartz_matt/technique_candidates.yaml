- technique_id: coulomb_green_function_finite_width
  label: Coulomb Green's function with finite particle width
  description: 'Solve the Schrodinger equation with a Coulomb potential V(r) = -C*alpha_s/r including the particle''s intrinsic
    width Gamma as an imaginary part of the energy, E -> E + i*Gamma. The resulting Green''s function G(0,E) at the origin
    encodes all bound-state resonances and the continuum, and directly gives the near-threshold production cross section via
    the optical theorem: sigma ~ Im G(0,E) * sigma_0.

    '
  unlocks: 'Unified treatment of bound state production and annihilation for particles with non-negligible intrinsic width
    (like top quarks or gluinos with fast decays), interpolating smoothly between narrow resonances and broad continuum enhancement.

    '
