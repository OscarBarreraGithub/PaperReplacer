- technique_id: forward_central_flavour_extraction
  label: Forward-central jet asymmetry for flavour-separated jet charge
  description: 'In dijet events, classify the two jets as "more forward" and "more central" in rapidity. The more-forward
    jet correlates with the higher-x parton and is more likely to be a valence quark jet. Comparing jet charge distributions
    between forward and central jets extracts the energy-dependence of the average jet charge for a given flavour, which perturbative
    QCD (SCET) predicts to decrease with energy.

    '
  unlocks: 'Extraction of the pT-dependence of the jet charge for specific parton flavours from inclusive dijet data, providing
    a direct test of perturbative fragmentation evolution and PDF consistency.

    '
  prerequisites:
