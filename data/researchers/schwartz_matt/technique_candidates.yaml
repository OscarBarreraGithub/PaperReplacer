- technique_id: contour_deformation_glauber_containment
  label: Contour deformation argument for Glauber containment
  description: 'Shows that Glauber contributions are contained in the soft (eikonal) contribution by deforming the integration
    contour in the complex k-minus plane away from the Glauber region. This works whenever no initial-state momentum is collinear
    to a final-state momentum, because the poles from different propagators are on the same side of the Glauber region and
    the contour can be deformed around them.

    '
  unlocks: 'Proving that amplitude-level factorization holds for hard scattering whenever no incoming particle is collinear
