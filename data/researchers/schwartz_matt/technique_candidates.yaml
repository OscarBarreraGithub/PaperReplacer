- technique_id: dynamical_threshold_enhancement
  label: Dynamical threshold enhancement from PDF fall-off
  description: 'Exploits the rapid fall-off of PDFs at large momentum fraction x to argue that threshold logarithms dominate
    the cross section well away from the machine threshold. Even when x is not close to 1, the PDFs suppress contributions
    from non-threshold regions, making the partonic threshold expansion a good approximation to the full hadronic cross section.
    Verified to capture 80-90% of NNLO corrections in cases where the full result is known.

    '
  unlocks: 'Justifies the use of threshold-resummed predictions at phenomenologically relevant (moderate) pT values, not just
    near the machine kinematic limit, greatly extending the applicability of threshold resummation techniques.

    '
  prerequisites:
  - parton distribution function behavior at large x
  - threshold expansion of partonic cross sections
  - comparison with known higher-order results
  source_papers:
  - '1008.4355'
  - '1206.6115'
  mention_count: 2
  overlap_classification: new_distinct
- technique_id: hard_s_matrix_construction
  label: Hard S-matrix (S_H) construction via asymptotic Hamiltonian
  description: 'Replaces the free Hamiltonian H_0 in the Moller operators with a soft-collinear asymptotic Hamiltonian H_as
    (the SCET Hamiltonian including soft, collinear, and Glauber interactions). The hard S-matrix S_H = Omega_H+ dagger *
    Omega_H- has IR-finite matrix elements because H_as reproduces all the IR-divergence-generating soft and collinear limits
    of the full Hamiltonian H. The elements of S_H are gauge invariant and exist even in conformal field theories.

    '
  unlocks: 'Constructing a well-defined, IR-finite scattering matrix for gauge theories with massless particles (QED, QCD,
    N=4 SYM), replacing the traditional S-matrix whose elements are either infinite (perturbatively) or zero (non-perturbatively
    after exponentiation). This provides access to the mathematical properties of scattering without the IR-divergence obstruction.

    '
  prerequisites:
  - Moller operators and asymptotic completeness
  - Soft-Collinear Effective Theory (SCET) Lagrangian
  - Factorization of IR divergences in gauge theories
  - Wilson coefficients and matching
  - Haag's theorem and limitations of the interaction picture
  source_papers:
  - '1906.03271'
  - '1911.06821'
  mention_count: 2
  overlap_classification: new_distinct
- technique_id: absorb_np_into_ckm_refit
  label: Absorbing New Physics into CKM Refits
  description: 'When a new-physics operator modifies a SM vertex with the same Dirac structure (e.g. O^u_LL shifts the bWc
    coupling), absorb the shift into the experimentally measured V_cb, then propagate the consequences through the CKM unitarity
    fit to obtain shifted values of V_ts and V_td. This isolates the genuinely new-physics effects to loop-level processes
    where they can be bounded.

    '
  unlocks: 'Correctly separates new-physics contributions that are degenerate with SM CKM elements at tree level, avoiding
    spurious constraints or missed effects that arise from naively adding NP shifts to SM parameters without refitting the
    CKM.

    '
  prerequisites:
  - ckm_matrix
  - ckm_unitarity_fits
  - electroweak_precision_observables
  - tree_level_vs_loop_level_processes
  source_papers:
  - '0704.1482'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: adiabatic_approximation_extra_dim
  label: Adiabatic Approximation for Twisted Fermion Profiles
  description: 'Apply the quantum-mechanical adiabatic approximation to the z-dependent zero-mode equation [∂_z - M̃(z)]f(z)
    = 0 by assuming each solution tracks a single eigenvalue of the mass matrix at each point. The ansatz f_α(z) ~ exp(∫m_α(z'')dz'')
    V_α(z) gives localized profiles that rotate in flavor space, valid when mass eigenvalue splittings are large compared
    to the rate of twisting.

    '
  unlocks: 'Analytic understanding of how twisted bulk mass matrices produce flavor hierarchies and mixing angles, with explicit
    control over when the approximation breaks down (near eigenvalue crossings, analogous to non-adiabatic transitions in
    quantum mechanics).

    '
  prerequisites:
  - adiabatic approximation in quantum mechanics
  - eigenvalue decomposition of position-dependent matrices
  - split fermion zero-mode equations
  source_papers:
  - hep-ph/0407260
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: ads5_logarithmic_running
  label: Logarithmic gauge coupling running in AdS5
  description: 'Compute gauge boson self-energy in the full 5D AdS theory using position-space propagators in the fifth dimension
    and a position-dependent UV cutoff motivated by the AdS/CFT correspondence. The warp factor ensures that couplings run
    logarithmically (not as a power law), with beta functions proportional to multiples of 4D standard model beta functions.

    '
  unlocks: 'Perturbative gauge coupling unification at a high scale in warped extra dimension models that also solve the hierarchy
    problem, circumventing the apparent obstacle that power-law running in extra dimensions would prevent high-scale unification.

    '
  prerequisites:
  - Randall-Sundrum warped geometry
  - 5D gauge boson propagators (Bessel functions)
  - AdS/CFT correspondence
  - gauge coupling unification
  - Kaluza-Klein decomposition
  source_papers:
  - hep-th/0108115
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: ads_qcd_pseudoscalar_sector
  label: AdS/QCD modeling of the pseudoscalar meson sector
  description: 'Introduce a 5D bulk field Y dual to the gluon field strength G^2 alongside the bifundamental scalar X (dual
    to the quark condensate) in an AdS background with an IR cutoff. The U(1)_A anomaly is encoded as a 5D gauge symmetry
    broken by a bulk coupling kappa*Y*det(X), and parameters are fixed by matching to the QCD operator product expansion (g5,
    C, ga, c4). This lets one compute the eta-prime mass and eta-gamma-gamma couplings from first principles with very few
    inputs.

    '
  unlocks: 'First-principles calculation of the eta-prime mass and the neutral pseudoscalar spectrum (eta, eta-prime masses,
    decay constants, and photon decay rates) in a framework that manifests the anomaly non-perturbatively, bypassing instanton
    infrared divergences and lattice expense.

    '
  prerequisites:
  - AdS/CFT correspondence basics
  - Chiral symmetry breaking and the U(1)_A anomaly
  - QCD operator product expansion (OPE)
  - Five-dimensional gauge theory and bulk-to-boundary propagators
  source_papers:
  - '0705.0534'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: algebraic_letter_construction
  label: Systematic Construction of Algebraic Symbol Letters from Singularities
  description: 'Constructs candidate algebraic symbol letters by requiring that P^2 - Q equals a numeric multiple of products
    of known Landau singularity polynomials, where the letter takes the form (P + sqrt(Q))/(P - sqrt(Q)). This systematic
    search replaces ad-hoc guesswork in constructing the symbol alphabet for integrals with square-root branch points.

    '
  unlocks: 'Determination of the complete symbol alphabet for Feynman integrals involving algebraic singularities, by reducing
    the problem to scanning polynomial constraints derived from the Landau variety.

    '
  prerequisites:
  - symbol letters and their relation to branch cuts
  - Landau variety and its polynomial description
  - algebraic number theory (multiplicative independence)
  - Galois symmetry constraints
  source_papers:
  - '2410.02424'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: alpha_positivity_constraints
  label: Alpha-Positivity Constraints on Symbol Letters
  description: 'Uses the fact that the original Feynman parameter integration contour runs over positive alpha_e and real
    loop momenta to determine which singularities are accessible before analytic continuation (alpha-positive singularities).
    Only alpha-positive singularities can appear in the first entry of the symbol. Algebraic singularities that are not alpha-positive
    must cancel via Galois symmetry.

    '
  unlocks: 'Strong restrictions on which symbol letters can appear in specific entries, dramatically reducing the space of
    allowed functions for the Feynman integral. For algebraic singularities, this implies the result must be even under root-sign
    flips.

    '
  prerequisites:
  - Feynman parameterization and its relation to Landau parameters
  - symbol entries and their physical interpretation as branch cuts
  - Galois symmetry of algebraic letters
  - physical-sheet vs. unphysical-sheet singularities
  source_papers:
  - '2410.02424'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: amplitude_level_soft_subtraction
  label: Regulator-independent amplitude-level soft-collinear subtraction
  description: 'Construct a subtracted matrix element M_sub that reproduces the full QCD amplitude at leading power in all
    soft and collinear limits simultaneously, without specifying which sector each momentum belongs to. The subtraction uses
    Wilson-line matrix elements to cancel the soft limit of collinear contributions and vice versa, and is defined recursively
    for arbitrary numbers of extra partons.

    '
  unlocks: 'Phase-space integration over factorized amplitudes without introducing explicit angular (R) or energy (Lambda)
    cutoffs between sectors, potentially useful as a subtraction scheme for NNLO and beyond fixed-order QCD calculations.

    '
  prerequisites:
  - QCD factorization at the amplitude level (Feige-Schwartz)
  - Wilson lines and eikonal approximation
  - soft-collinear effective theory (SCET) field content
  source_papers:
  - '1502.05411'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: angular_dependent_hard_soft_interplay
  label: Angular dependence cancellation between hard and soft functions
  description: 'The hard function depends on the scattering angle v through ln(v*vbar), while the soft function depends on
    the geometry through ln(2n_12/(n_1J*n_2J)). RG invariance of the cross section requires these angular dependences to cancel
    non-trivially between the hard and soft anomalous dimensions. This cancellation, verified by explicit calculation, provides
    a powerful cross-check on the factorization theorem and constrains the structure of anomalous dimensions for multi-leg
    processes.

    '
  unlocks: 'Confidence that the factorization theorem correctly handles the interplay of angular and energy-scale logarithms
    in multi-jet processes. Constrains the form of soft anomalous dimensions for general n-jet operators.

    '
  prerequisites:
  - Color-space formalism for multi-parton anomalous dimensions
  - Casimir scaling of the cusp anomalous dimension
  - Three-loop anomalous dimensions from infrared singularities of QCD amplitudes
  source_papers:
  - '0911.0681'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: approximate_bounce_solutions
  label: Approximate Analytic Bounces for SM-like Potentials
  description: 'For potentials where the quartic coupling runs through zero (as in the SM), use approximate bounce solutions
    that interpolate analytically between the Fubini-Lipatov instanton (for the scale-invariant part) and corrections from
    the running coupling. The bubble radius R is determined by the scale where beta_lambda = 0. These approximate bounces
    capture the essential physics and allow analytic estimates of the tunneling action.

    '
  unlocks: 'Provides a new derivation that the SM bubble size R ~ (10^17 GeV)^{-1} is set by the zero of the beta-function
    for the Higgs quartic, and enables analytic study of UV sensitivity to higher-dimension operators without numerical bounce-finding.

    '
  prerequisites:
  - Fubini-Lipatov instanton in lambda phi^4 theory
  - SM RG running of the Higgs quartic coupling
  - bounce equation with O(4) symmetry
  source_papers:
  - '1604.06090'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: asymmetric_thrust_definition
  label: Asymmetric thrust to avoid beam contamination
  description: 'Instead of dividing the event into two equal hemispheres (which would be contaminated by beam remnants at
    hadron colliders), define asymmetric thrust by taking one jet of size R and everything else as the other "jet." Beam remnants
    contribute to the same hemisphere and largely cancel, making the observable insensitive to unmeasured forward radiation
    while retaining sensitivity to jet substructure.

    '
  unlocks: 'A practical hadronic event shape that can be resummed in SCET and measured at the LHC, avoiding the non-global
    logarithm and beam contamination problems that plague naive hemisphere-based observables.

    '
  prerequisites:
  - Event shape definitions and infrared safety
  - Non-global logarithms and their avoidance
  - SCET factorization for jet observables
  source_papers:
  - '1008.4355'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: asymmetric_thrust_jet_mass
  label: Asymmetric thrust for inclusive jet mass resummation
  description: 'Define asymmetric thrust tau_A as the sum of the mass-squared of one primary jet and the mass-squared of everything
    else in the event, using Cambridge/Aachen clustering of size R. By averaging over the quark and antiquark jets (or equivalently
    the harder and softer jets), agreement between SCET and QCD is obtained for all R at NLO, and NNLL resummation is verified
    at order alpha_s^2.

    '
  unlocks: 'A well-defined inclusive jet mass observable that can be resummed to NNLL accuracy without encountering non-global
    logarithm problems. Serves as a building block for jet mass measurements at hadron colliders via dynamical threshold enhancement.

    '
  prerequisites:
  - SCET factorization for hemisphere-like observables
  - Cambridge/Aachen jet algorithm
  - Jet-quark correspondence and its limitations
  - Numerical QCD event generators (EVENT2)
  source_papers:
  - '1102.0561'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: asymptotic_region_feynman_rules
  label: Asymptotic-region Feynman rules from TOPT
  description: 'Derive Feynman rules for the asymptotic evolution factor by combining the method of regions (expanding loop
    integrands in soft/collinear scaling) with time-ordered perturbation theory. Asymptotic-region contributions produce scaleless
    integrals in pure dimensional regularization that vanish, dramatically simplifying calculations.

    '
  unlocks: 'Makes explicit perturbative computation of the hard S-matrix tractable: the asymptotic contributions either cancel
    IR divergences (with cutoffs) or vanish as scaleless integrals (in dim-reg), leaving only the finite hard part.

    '
  prerequisites:
  - Time-ordered perturbation theory (TOPT)
  - Method of regions for loop integrals
  - SCET power counting
  source_papers:
  - '1911.06821'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: b_physics_constraints_on_top_fcnc
  label: B-Physics Constraints on Top FCNC Operators via Weak-Scale Matching
  description: 'Integrate out the top, W, and Z at one loop to match the high-scale FCNC operators onto the standard B-physics
    effective Hamiltonian (operators O_7gamma, O_9V, O_10A). Use existing precision measurements of B->X_s gamma, B->X_s l+l-,
    semileptonic B decays, B_s mixing, and B->rho gamma to constrain the Wilson coefficients of each top FCNC operator individually.

    '
  unlocks: 'Enables determination of which top FCNC operators can still produce an observable signal at the LHC and which
    are already ruled out by B-factory data, without reference to any specific BSM model. Reveals that operators with left-handed
    light-quark fields are closed, while right-handed charm/up operators remain open.

    '
  prerequisites:
  - wilson_coefficients
  - operator_product_expansion
  - b_meson_rare_decays
  - renormalization_group_evolution
  - ckm_matrix
  - inami_lim_functions
  source_papers:
  - '0704.1482'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: backward_generation_training_data
  label: Backward Generation of Simplification Training Data
  description: 'Generates training data by starting from simple target expressions and scrambling them into complicated equivalent
    forms using Schouten identities, momentum conservation, multiplication by unity, and addition of zero. This avoids the
    need for a simplification oracle and guarantees that every training pair has a known simple form.

    '
  unlocks: 'Creation of arbitrarily large training datasets for symbolic simplification tasks where no forward simplification
    algorithm exists, with controllable difficulty (number of scrambling steps).

    '
  prerequisites:
  - mathematical identities relating equivalent expressions
  - prefix notation for mathematical expressions
  - data augmentation strategies
  source_papers:
  - '2408.04720'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: binary_junipr_objective
  label: Binary JUNIPR objective function for jet discrimination
  description: 'Refines the unsupervised JUNIPR probabilistic jet model for discrimination by replacing the unary log-likelihood
    objective with a binary cross-entropy that simultaneously trains two JUNIPR models (P_J(jet|a) and P_J(jet|b)) to maximize
    the Bayesian classification probability P(a|jet). Pre-training with the unary objective followed by refinement with the
    binary objective combines the benefits of unsupervised feature learning and supervised discrimination.

    '
  unlocks: 'Achieving state-of-the-art quark/gluon discrimination (AUC 0.8986) and near-state-of-the-art top tagging (AUC
    0.9810) while maintaining full physical interpretability of the model -- each branching step''s contribution to the classification
    can be decomposed and visualized.

    '
  prerequisites:
  - JUNIPR framework (autoregressive jet probability model)
  - Jet clustering trees (kT, Cambridge/Aachen)
  - Recurrent neural networks (LSTM)
  - Bayes' theorem and likelihood ratio classification
  source_papers:
  - '1906.10137'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: bms_fixed_order_iteration
  label: Fixed-order iteration of the BMS equation as integrand generator
  description: 'Rather than enumerating all real, virtual, and real-virtual emission contributions at each loop order (which
    grows combinatorially), iterate the BMS integro-differential equation perturbatively to generate the correct NGL integrand
    automatically. The BMS iteration is equivalent to but significantly simpler than the direct SEO construction.

    '
  unlocks: 'Systematic generation of correct NGL integrands at arbitrary loop order, avoiding the combinatorial explosion
    of tracking real/virtual emission assignments.

    '
  prerequisites:
  - BMS equation
  - strong energy ordering (SEO) approximation
  - dipole radiator functions
  source_papers:
  - '1403.4949'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: boosted_event_shape_recycling
  label: Computing jet substructure by boosting e+e- event shapes
  description: 'Maps jet substructure observables (specifically N-subjettiness ratios T2/T1) for boosted color-singlet decays
    at the LHC to the well-known e+e- event shape distributions (thrust) by noting that in the large-boost limit Q -> infinity,
    finite jet size, ISR, and UE effects are all 1/Q-suppressed. The 2-jettiness soft function is related to the hemisphere
    soft function by a rescaling beta_theta that depends on the helicity angle.

    '
  unlocks: 'Enables N3LL-accurate calculations of jet substructure distributions at the LHC by recycling the extensive existing
    library of e+e- event shape calculations, bypassing the need for dedicated multi-loop computations in the hadronic environment.

    '
  prerequisites:
  - N-subjettiness / N-jettiness observables
  - thrust distribution in e+e- at N3LL
  - hemisphere soft function at O(alpha_s^2)
  - SCET factorization for event shapes
  source_papers:
  - '1204.3898'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: branching_step_interpretability
  label: Branching-step decomposition for classifier interpretability
  description: 'Decomposes the JUNIPR classification probability into contributions from each branching step t in the clustering
    tree, and further into components (end probability, mother selection, energy fraction z, angles theta/phi/delta). By plotting
    the ratio of per-step probabilities averaged over signal vs background jets, one can identify which branchings and which
    physical features drive the discrimination.

    '
  unlocks: 'Providing concrete physical insight into what machine learning classifiers learn: e.g., that quark/gluon discrimination
    is driven by multiplicity (P_end) at late branchings and jet width (theta) at intermediate branchings, while Pythia/Herwig
    differences are driven by energy fractions and angles at early (perturbative) branchings.

    '
  prerequisites:
  - Jet clustering tree structure
  - Probabilistic generative models
  - Splitting function physics (z, theta distributions)
  - Monte Carlo generator comparison (Pythia vs Herwig)
  source_papers:
  - '1906.10137'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: c_parameter_shoulder_factorization
  label: SCET Factorization for the C-Parameter Shoulder
  description: 'Derive a factorization theorem for the C-parameter distribution near C = 3/4 using SCET, involving new jet
    and soft functions specific to the C-parameter measurement. The C-shoulder jet function measures Σ(p_⊥^x)² / (n̄·p_a),
    the azimuthally-weighted transverse momentum squared divided by energy, while the soft function measures k_⊥²/k_0. The
    factorized cross section is σ = H × J_q × J_q̄ × J_g ⊗ S.

    '
  unlocks: 'Resummed predictions for the C-parameter distribution near its Sudakov shoulder at C = 3/4, turning the unphysical
    NLO spike into a smooth Sudakov form factor. The absence of a Sudakov-Landau pole makes momentum-space resummation straightforward.

    '
  prerequisites:
  - SCET (soft-collinear effective theory)
  - trijet kinematics and Mercedes configuration
  - anomalous dimensions (cusp and non-cusp)
  - profile function techniques
  source_papers:
  - '2601.02484'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: ca_iterative_declustering
  label: Cambridge-Aachen Iterative Declustering for Subjet Finding
  description: 'Cluster jets with large-radius Cambridge-Aachen algorithm, then reverse the clustering history to iteratively
    decluster each jet. At each step, discard the softer branch if its pT fraction falls below a threshold delta_p, continuing
    on the harder branch until 3 or 4 hard subjets are resolved.

    '
  unlocks: 'Resolving the 3-prong substructure of boosted hadronically-decaying top quarks inside a single fat jet, even when
    the decay products are too collimated for standard fixed-cone jet algorithms.

    '
  prerequisites:
  - Cambridge-Aachen jet algorithm
  - sequential recombination jet clustering
  - top quark decay kinematics (t -> bW -> b q qbar)
  - concept of jet radius parameter R
  source_papers:
  - '0806.0848'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: calculation_scale_invariance
  label: Calculation-Scale Independence for RG-Improved Potentials
  description: 'The effective potential depends on the scale mu_0 at which it is computed, not just the RG scale mu. This
    dependence is compensated by field rescaling (anomalous dimension). Exploit the fact that V at extrema is mu_0-independent
    to circumvent the RG kernel for field-strength renormalization (which is gauge-dependent to all orders): run couplings
    to the minimum scale before computing V in perturbation theory, so that no field-strength resummation (exp(Gamma)) is
    needed.

    '
  unlocks: 'Enables a resummed (RG-improved) effective potential whose value at the minimum is gauge-invariant order by order,
    without needing to deal with the gauge-dependent anomalous dimension at all orders.

    '
  prerequisites:
  - RGE for the effective potential including anomalous dimension term
  - distinction between RG scale mu and calculation scale mu_0
  - Nielsen identity and its limitations in perturbation theory
  source_papers:
  - '1408.0287'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: casimir_scaling_soft_anomalous_dim
  label: Casimir scaling to relate soft functions in different partonic channels
  description: 'The soft functions for the q-qbar -> g-gamma and q-g -> q-gamma channels differ only in which color representation
    (fundamental vs. adjoint) is associated with which direction. At least through three loops, Casimir scaling relates the
    two soft anomalous dimensions: gamma^S_qqbar = (2C_F - C_A)/C_A * gamma^S_qg. Combined with RG invariance constraints,
    this determines all soft anomalous dimensions from the known hard and jet anomalous dimensions.

    '
  unlocks: 'Three-loop soft anomalous dimensions for all partonic channels without a direct three-loop calculation. Reduces
    the number of independent calculations needed for NNLL resummation of multi-channel processes.

    '
  prerequisites:
  - Casimir scaling of the cusp anomalous dimension (proven to three loops)
  - RG invariance relations among hard, jet, soft, and PDF anomalous dimensions
  - Color structure of Wilson line operators for different partonic channels
  source_papers:
  - '0911.0681'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: charged_track_multiplicity_tagger
  label: Charged Track Multiplicity for Quark/Gluon Tagging
  description: 'Count the number of charged tracks (pT > 500 MeV) inside a jet. Gluon jets have higher multiplicity than quark
    jets, scaling as <N_g>/<N_q> ~ CA/CF = 9/4 at leading order. This is the single most powerful discrete discriminant.

    '
  unlocks: 'The strongest single discrete variable for quark/gluon discrimination, especially at high pT where the parton
    shower produces more tracks and the CA/CF ratio is better established.

    '
  prerequisites:
  - QCD color factor ratio CA/CF = 9/4
  - charged particle tracking with pT threshold
  - parton shower multiplicity scaling
  source_papers:
  - '1106.3076'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: clustering_algorithm_independence
  label: Clustering-Algorithm Independence of Learned Jet Probabilities
  description: 'The JUNIPR framework produces the same probability distribution P_jet over final-state momenta regardless
    of which clustering algorithm (C/A, anti-kT, or even an absurd "printer" algorithm) is used to define the tree, because
    the final-state momenta are algorithm-independent. Different algorithms simply redistribute probabilities across branchings.

    '
  unlocks: 'Guarantees that the learned jet probability is a physical quantity rather than an artifact of the chosen clustering
    procedure, and allows users to pick the algorithm that makes the network''s internal representations most interpretable
    (e.g. C/A for angular-ordered physics).

    '
  prerequisites:
  - jet_clustering_algorithms
  - cambridge_aachen_algorithm
  - anti_kt_algorithm
  source_papers:
  - '1804.09720'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: collective_coord_qft_decay_rate
  label: Correct Collective Coordinate Treatment for QFT Decay Rates
  description: 'Applies the intersection number fix to the decay rate calculation in lambda*phi^4 QFT (lambda < 0), where
    the bounce solution has five zero modes (four translations plus one dilatation). Shows that the standard T*V factor for
    the numerator and the apparent T*V factor in the denominator of Eq.(1.1) are resolved by properly accounting for the intersection
    numbers in both the interacting and free path integrals.

    '
  unlocks: 'Consistent path integral computation of vacuum decay rates in quantum field theory where both translations and
    dilatations must be handled as collective coordinates, resolving the paradox of an unexpected volume factor appearing
    in the free-theory normalization.

    '
  prerequisites:
  - bounce solution in scalar field theory
  - functional determinants and zero mode subtraction
  - R-coordinates for dilatation collective coordinate
  - Riemannian metric on field space
  source_papers:
  - '2402.18633'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: collinear_rs_decoupling
  label: Collinear-r_s choice for soft decoupling from a single jet
  description: 'In factorization gauge, choosing r_s = p_j (the direction of jet j) forces all soft attachments to the j-jet
    to vanish at leading power, because the soft vertex gives p_j^mu which is orthogonal to all soft propagators and polarizations
    when r_s = p_j. This makes the j-jet amplitude identical to its full-QCD form with no soft connections.

    '
  unlocks: 'Establishes single-sector soft-collinear factorization: the matrix element with soft Wilson lines and a field
    in direction j factorizes into the product of the pure collinear matrix element times the soft Wilson-line matrix element.
    Since the result is gauge-invariant, it holds in any gauge despite being derived in a specific one.

    '
  prerequisites:
  - factorization_gauge
  - lightcone_gauge_numerator_suppression
  - soft_attachment_lemma
  - gauge_invariance_of_amplitude
  source_papers:
  - unknown
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: color_channel_decomposition_bound_states
  label: Color-channel decomposition for bound state spectroscopy
  description: 'Decompose the tensor product of color representations (e.g., 8x8 = 1_S + 8_S + 8_A + 10_A + 10bar_A + 27_S)
    and compute the Coulomb color factor C for each channel to determine which channels are attractive (form bound states),
    repulsive, or flat. Combined with Fermi statistics for identical particles, this determines the spin-color quantum numbers
    (J^PC) of each bound state.

    '
  unlocks: 'Complete classification of which bound states form and their quantum numbers for any pair of colored particles,
    enabling targeted searches for specific resonance signatures (pseudoscalar -> gg vs vector -> qq).

    '
  prerequisites:
  - SU(3) representation theory and Casimir operators
