- technique_id: fragmenting_jet_function_formalism
  label: Fragmenting Jet Functions for Jet Charge Calculation
  description: 'Express the average jet charge <Q_kappa> in terms of fragmenting jet functions J_ij(E,R,x,mu) convolved with
    fragmentation functions D^h_j(x,mu). The energy and jet-size dependence is perturbatively calculable, while the nonperturbative
