- technique_id: electroweak_sudakov_correction
  label: Leading-log electroweak Sudakov corrections for high-ET photon production
  description: 'Include the resummation of leading electroweak Sudakov logarithms (from virtual W/Z loops connecting charged
    quarks) which lower the direct photon cross section by up to ~10% at high ET. The correction is parameterized as a smooth
    rational function of ET/TeV and corrects the sensitivity to the choice of alpha_e scale (alpha_e = 1/137 vs. 1/129).

    '
  unlocks: 'Percent-level accuracy at high ET (>500 GeV) where electroweak effects are comparable to QCD scale uncertainties,
    providing one of the first direct demonstrations of electroweak Sudakov logarithms in LHC data.

    '
  prerequisites:
