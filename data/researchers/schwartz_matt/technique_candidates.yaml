  description: 'Use the Landau bootstrap (singularity analysis via SOFIA) to determine the alphabet and construct the function
    space top-down, then use analytic regression bottom-up to fix the rational coefficients. The two approaches are complementary:
    the bootstrap constrains which functions can appear, while regression determines how they combine.

    '
  unlocks: 'Complete determination of Feynman integrals by combining top-down analytic structure constraints with bottom-up
    numerical fitting, applicable even when the bootstrap alone cannot fully fix the answer.

    '
  prerequisites:
  - Landau analysis and principal Landau determinants
  - integrable symbol construction
  - lattice reduction or PSLQ
  - AMFlow for numerical evaluation
  source_papers:
  - '2507.17815'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: landau_symbol_constraints
  label: Landau-equation constraints on the symbol of Feynman integrals
  description: 'Connect the Landau exponent gamma = (lD - n - 1)/2, which governs the leading non-analytic behavior phi_0^gamma
    log(phi_0) near a Landau locus, to the position of the corresponding symbol letter in iterated integrals. When a single
    symbol letter vanishes at a singular point, the position q at which it appears determines the singular behavior as phi_0^q
    log(phi_0), imposing gamma = q.

    '
  unlocks: 'Bounds the transcendental weight of polylogarithmic l-loop integrals with generic masses in D dimensions to be
    at most floor(Dl/2), proving a longstanding conjecture. Also constrains which symbol letters can appear at which positions.

    '
  prerequisites:
  - Landau equations and singularity analysis of Feynman integrals
  - Symbol map and iterated integrals
  - Feynman parametrization
  source_papers:
  - '2109.09744'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: laplace_transform_rge_solution
  label: Laplace transform technique for non-local RG equations
  description: 'The jet and soft functions satisfy integro-differential RG equations that are non-local in p^2 or k. Taking
    a Laplace transform converts these to local (ordinary) differential equations in the conjugate variable nu, which can
    be solved in closed form. The inverse transform then produces the resummed function with derivatives acting on a kernel
    of the form (p^2/mu^2)^eta / Gamma(eta), where eta encodes the anomalous dimension information.

    '
  unlocks: 'Closed-form analytic solutions for RG equations involving convolution-type non-localities, which would otherwise
    require numerical methods. This is essential for any SCET resummation involving jet or soft functions.

    '
  prerequisites:
  - Laplace transform and its inverse
  - Star-distribution (mu-distribution) formalism
  - Properties of the Gamma function and its derivatives
  source_papers:
  - '0709.2709'
  mention_count: 1
  overlap_classification: new_distinct
- technique_id: lattice_reduction_analytic_regression
  label: Lattice Reduction for Analytic Regression of Feynman Integrals
  description: 'Decompose a Feynman integral f(x) = Σ c_i B_i(x) into known basis functions B_i(x) with unknown rational coefficients
    c_i by constructing an integer lattice from high-precision numerical evaluations at multiple kinematic points and applying
    the LLL algorithm. The key insight is trading higher precision at one point for sampling at many points.

    '
  unlocks: 'Exact analytic expressions for multi-loop Feynman integrals from their numerical evaluations, bypassing the need
    to solve differential equations analytically or complete a full Landau bootstrap. Works up to hundreds of basis functions.

    '
  prerequisites:
  - high-precision numerical evaluation of Feynman integrals (AMFlow)
