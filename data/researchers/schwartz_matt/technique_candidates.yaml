- technique_id: compatibility_of_contractions
  label: Compatibility Test for Landau Singularity Pairs
  description: 'Two Landau singularities are compatible if their Landau equations can be solved simultaneously. Sequential
    discontinuities with respect to non-compatible singularities must vanish. For generic masses, this can be diagnosed graphically:
    two contractions are compatible iff the on-shell momenta required by the first cut are consistent with the loop equations
    for the second.

    '
  unlocks: 'A systematic graphical test for determining which sequences of discontinuities of a Feynman integral can be nonzero,
    providing powerful constraints for amplitude bootstrap calculations.

    '
  prerequisites:
