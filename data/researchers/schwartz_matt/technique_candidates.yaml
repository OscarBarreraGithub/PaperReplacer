- technique_id: lipatov_vertex_factorization_violation
  label: Lipatov vertex as source of factorization violation
  description: 'Identifies that the leading factorization-violating effects must come from graphs with at least one soft gluon
    connecting Glauber rungs via the Lipatov vertex (the effective 3-gluon vertex coupling two Glauber gluons to a soft gluon).
    For these graphs, the quantum anomalous dimension breaks scale invariance, preventing the cancellation mechanism that
    eliminates pure ladder contributions.

    '
  unlocks: 'Narrowing the search for factorization-violating effects to a specific class of diagrams, and establishing that
