- technique_id: consistent_veff_power_counting
  label: Modified Power Counting for Gauge-Invariant Effective Potential Extrema
  description: 'Near a radiatively generated minimum of the effective potential (as in Coleman-Weinberg or the SM instability),
    the quartic coupling scales as lambda ~ hbar, so the standard loop expansion breaks down. Reorganize perturbation theory
    with lambda ~ hbar power counting: at LO include both tree-level and 1-loop terms; at NLO include the hbar^2 piece of
    the 1-loop potential plus the lambda^0 part of the 2-loop potential, plus an infinite series of higher-loop daisy diagrams
    (which vanish in Landau gauge). The value of V at its minimum is then gauge-invariant order by order.

    '
  unlocks: 'Produces gauge-invariant SM stability bounds (m_h > 129.4 +/- 2.3 GeV, m_t < 171.2 +/- 0.3 GeV) that are independent
    of the Fermi-gauge parameter xi, unlike the traditional approach. Applicable to any model where metastability is driven
    by radiative corrections.

    '
  prerequisites:
