- technique_id: factorization_to_scet_derivation
  label: Deriving SCET from on-shell factorization
  description: 'Once the on-shell factorization formula is proven (that QCD matrix elements factor into collinear pieces times
    soft Wilson lines), the effective theory follows trivially: define L_EFT = L_1 + ... + L_N + L_soft as N+1 decoupled copies
    of the QCD Lagrangian, assign quantum numbers to states in different sectors, and collapse the factored matrix elements
    into a single operator whose anomalous dimension resums logarithms. This gives a theory equivalent to SCET at leading
    power without the usual derivation through field redefinitions and mode separation.

    '
  unlocks: 'Provides a minimal, physically transparent route from QCD to an effective theory for jet physics, avoiding the
    technical complexities of the standard SCET derivation while maintaining all its resummation capabilities.

    '
  prerequisites:
  - on-shell factorization formula (Eq. 2 of the paper)
  - effective field theory construction
  - anomalous dimensions for resummation
