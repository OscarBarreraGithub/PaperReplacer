- technique_id: likelihood_ratio_from_unsupervised_models
  label: Likelihood-Ratio Discrimination from Unsupervised Probabilistic Models
  description: 'Train two separate JUNIPR models on two jet populations (e.g. boosted Z jets vs quark jets), then form the
    likelihood ratio P_Z(jet)/P_q(jet) as a discriminant. This is statistically optimal by the Neyman-Pearson lemma and requires
    only N models to distinguish N classes (vs N(N-1)/2 supervised classifiers).

    '
  unlocks: 'Provides theoretically optimal jet discrimination without labeled training data, and allows visualization of where
