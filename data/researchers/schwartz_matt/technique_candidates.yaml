- technique_id: combined_alpha_s_from_multiple_event_shapes
  label: Combined alpha_s extraction from multiple event shapes to expose systematic biases
  description: 'By extracting alpha_s from both thrust and heavy jet mass using exactly the same N3LL+NNLO theoretical framework,
    systematic biases can be identified. Thrust gives alpha_s(m_Z) = 0.1175 +/- 0.0026 while heavy jet mass gives 0.1220 +/-
    0.0031. The ~5% systematic difference between the two classes of event shapes (identified at NLL+NNLO in earlier work)
    persists at N3LL, pointing to missing power corrections rather than missing logarithms. A weighted average of 0.1193 +/-
    0.0027 is consistent with the world average.

    '
  unlocks: 'Quantitative assessment of whether discrepancies between event shapes arise from perturbative or non-perturbative
    effects. Demonstrates that Monte Carlo hadronization models (PYTHIA) give qualitatively different and inconsistent corrections
    for thrust vs. heavy jet mass, motivating field-theoretic power correction approaches.

    '
