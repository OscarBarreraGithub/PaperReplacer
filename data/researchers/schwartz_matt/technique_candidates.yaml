- technique_id: effective_action_vs_potential_tunneling
  label: Proper Use of Effective Actions (Not Effective Potentials) in Tunneling
  description: 'Clarify that one must NOT use V_eff as the classical potential in which to find bounce solutions, because
    (1) derivative terms in the effective action contribute at the same order as potential terms, and (2) using V_eff double-counts
    radiative corrections (loops contribute both to V_eff and to the functional determinant around the bounce). The correct
    procedure is to find bounces of the classical action and compute NLO corrections via the functional determinant.

    '
  unlocks: 'Prevents a systematic error in decay rate calculations that would arise from conflating the effective potential
    with the classical potential when computing bounce solutions, especially in models with radiatively generated instabilities.

    '
  prerequisites:
  - distinction between 1PI effective action and classical action
  - functional determinant (1-loop correction) around the bounce
  - Coleman-Weinberg mechanism
  source_papers:
