  mention_count: 1
  overlap_classification: new_distinct
- technique_id: edgeworth_action_reconstruction
  label: Action Reconstruction from Connected Correlators via Edgeworth Expansion
  description: 'Uses the Edgeworth expansion to systematically reconstruct the field theory action from known connected correlators,
    order by order in the expansion parameter (1/N or independence-breaking parameter). A new Feynman diagram prescription
    is developed where the vertices are the connected correlators and the propagator is the inverse two-point function, inverting
    the usual role of couplings and correlators.

    '
  unlocks: 'Computation of approximate actions for neural network field theories at finite width, even when the action is
    not known a priori. This provides a bridge from the easily computable parameter-space correlators to the function-space
    action.

    '
  prerequisites:
  - connected correlation functions (cumulants)
  - Edgeworth expansion in statistics
  - Feynman diagram technology (propagators, vertices, combinatorics)
  - inverse two-point function computation
  source_papers:
