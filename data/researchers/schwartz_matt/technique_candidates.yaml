- technique_id: gauge_invariant_new_physics_stability
  label: Gauge-Invariant Sensitivity to New Physics via Operator Insertion
  description: 'Instead of evaluating a higher-dimension operator O_6 = h^6/Lambda_NP^2 at a gauge-dependent field value,
