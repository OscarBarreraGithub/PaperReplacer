- technique_id: energy_weighted_density_learning
  label: Energy-Weighted KL Divergence for Observable Learning
  description: 'Instead of learning the probability density p(ζ, E, m_t) and then integrating with energy weight, directly
    learn the energy-weighted distribution EEEC(ζ, m_t) using a modified KL divergence loss where each sample is weighted
    by its energy product E_i E_j E_k / Q^3. This focuses the network on the physically relevant high-energy region.

    '
  unlocks: 'Accurate learned surrogates of energy-weighted collider observables (like EECs) that correctly capture the high-energy
    tails where sensitivity to physical parameters like particle masses resides, overcoming the failure of naive density estimation
    which focuses on high-probability but low-energy regions.

    '
  prerequisites:
