- technique_id: gluon_jet_function_calculation
  label: One-loop gluon jet function from collinear gluon propagator
  description: 'Calculates the gluon jet function J_g(p^2) as the imaginary part of the time-ordered product of two collinear
    gluon field operators. In light-cone gauge the Wilson lines are trivial and only the standard gluon self-energy contributes.
    The result is expressed as a delta function plus star-distributions. The gluon jet anomalous dimension is then determined
