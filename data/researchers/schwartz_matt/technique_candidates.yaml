- technique_id: fierz_pauli_extension_no_go
  label: No-go theorem for extending Fierz-Pauli beyond Lambda_3
  description: 'Systematically classify all non-linear extensions of the Fierz-Pauli Lagrangian for a massive graviton by
    introducing Goldstone fields and checking whether any choice of cubic and higher-order terms can eliminate the dangerous
    scalar longitudinal mode interactions. Show conclusively that no extension can raise the strong coupling scale above Lambda_3
    = (m^2_g M_Pl)^(1/3).

    '
  unlocks: 'Definitive characterization of the maximum energy range of validity for any theory of a single massive graviton,
    establishing that the Fierz-Pauli tuning is the best possible at quadratic level and cannot be improved by adding non-linear
    terms.

    '
  prerequisites:
