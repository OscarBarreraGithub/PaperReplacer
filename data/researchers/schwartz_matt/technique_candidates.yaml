- technique_id: lightcone_gauge_numerator_suppression
  label: Lightcone-gauge numerator suppression (collinear Ward identity)
  description: 'In lightcone gauge with generic reference vector r, the propagator numerator satisfies p_mu Pi^{mu nu}(k)
    ~ kappa when k is collinear to p, providing an extra power of suppression beyond what the propagator denominators alone
    give. This restricts which diagrams can be collinear-sensitive and makes IR divergences at most logarithmic diagram-by-diagram.

    '
  unlocks: 'Eliminates entire classes of Feynman diagrams from contributing at leading power in physical gauges, enabling
    the reduced-diagram picture (hard-jet-soft topology). Without this, power-divergent diagrams in covariant gauges would
    obstruct a transparent factorization proof.

    '
  prerequisites:
