- technique_id: forward_scattering_ir_necessity
  label: Forward scattering as necessary ingredient for IR finiteness
  description: 'Demonstrates through explicit examples (e+e- -> Z, Compton scattering, gamma-gamma -> X) that forward scattering
    contributions are generically required for IR finiteness. For Compton scattering with massless electrons, the t-channel
    collinear divergence cancels only against the interference of the forward-scattering identity with box diagrams, implying
    that hard electrons and hard photons are effectively indistinguishable at high energy.

    '
  unlocks: 'Resolving long-standing puzzles about why certain exclusive processes have uncanceled IR divergences, and providing
    guidance on what sets of processes must be combined for meaningful physical predictions in theories with massless charged
    particles.

    '
  prerequisites:
