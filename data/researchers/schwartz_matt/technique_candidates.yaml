- technique_id: external_momentum_power_counting
  label: External-momentum power counting with lambda
  description: 'Power-count only in lambda, a parameter constraining external momenta (lambda_j = m_j/E_j for collinear sectors,
    lambda_s = E_s/Q for soft). Do not power-count virtual momenta directly. Instead, use the kappa scaling only to determine
    which loops are IR-sensitive. This separation avoids the subtleties of chopping up loop-momentum phase space into modes.

    '
  unlocks: 'Makes the factorization formula regulator-independent and avoids the complications of mode separation that plague
    SCET derivations. The proof holds at leading power in N+1 separate parameters (one per collinear sector plus one for soft),
    which means a single formula covers both SCET_I and SCET_II power-counting regimes.

    '
  prerequisites:
