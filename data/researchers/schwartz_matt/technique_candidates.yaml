- technique_id: event_image_cnn_classification
  label: Event-image CNN for jet classification
  description: 'Represent collider events as images (pixel intensity proportional to energy deposition in eta-phi space) and
    apply convolutional neural networks developed for computer vision. The approach treats jet substructure classification
    as an image recognition problem, automatically learning discriminating features without hand-crafted observables.

    '
  unlocks: 'Significantly outperforms traditional physics-motivated taggers (e.g. HEP Top Tagger) for tasks like boosted top
