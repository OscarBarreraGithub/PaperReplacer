- technique_id: conformal_gauge_ads
  label: Conformal gauge for simplifying Wilson line calculations in AdS
  description: 'Introduces a gauge choice in R x AdS coordinates that eliminates kinetic mixing between the radial (time)
    and angular (spatial) components of the gauge field. Since Wilson lines only source the A_tau component, and there is
    no A_tau^3 or A_tau^4 vertex in Yang-Mills theory, many non-planar graphs at 2- and 3-loops automatically vanish.

    '
  unlocks: 'Dramatically simplifies higher-loop computations of Wilson line anomalous dimensions by showing that certain graph
