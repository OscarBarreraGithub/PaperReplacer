- technique_id: daisy_resummation_gauge_invariance
  label: Daisy Resummation for Order-by-Order Gauge Invariance of V_min
  description: 'In the Coleman-Weinberg model, demonstrate that V_min is gauge-invariant at each order in the modified (lambda
