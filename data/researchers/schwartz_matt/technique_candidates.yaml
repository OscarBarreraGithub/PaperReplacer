- technique_id: girth_linear_radial_moment
  label: Girth (Linear Radial Moment) for Quark/Gluon Discrimination
  description: 'Define the girth g = sum_i (p_T^i / p_T^jet) |r_i|, a pT-weighted linear radial moment measuring the jet''s
