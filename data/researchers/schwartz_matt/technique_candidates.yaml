- technique_id: eikonal_identity_soft_subtraction
  label: Eikonal identity for soft-limit subtraction
  description: 'Use the identity 1/((p+k)^2) = 1/(2p.k) * [1 - k^2/((p+k)^2)] to decompose any propagator into its eikonal
    (soft-sensitive) part plus a remainder proportional to k^2. The k^2 factor renders the remainder soft-finite, cleanly
    separating soft physics from non-soft physics. This is the Grammer-Yennie decomposition adapted to the factorization context.

    '
  unlocks: 'Allows extraction of the soft-sensitive part of any loop integral in a controlled way, producing an eikonal loop
    that matches Wilson-line Feynman rules plus a remainder that is provably soft-finite. This is the engine behind proving
    that the Wilson coefficient (hard function) is IR-finite.

    '
  prerequisites:
  - eikonal_approximation
  - wilson_line_feynman_rules
  - infrared_power_counting
  - grammer_yennie_decomposition
  source_papers:
