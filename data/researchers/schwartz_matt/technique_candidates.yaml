- technique_id: local_energy_cutoff_for_holography
  label: Position-dependent UV cutoff for entropy-area scaling
  description: 'Impose a cutoff on local energy sqrt(g^tt) * E < Lambda in curved spacetime, which translates into an energy-dependent
    spatial cutoff. High-energy modes probe a smaller effective volume, naturally reducing the entropy scaling from volume-law
    to area-law in spacetimes with horizons or boundaries. This reproduces Bekenstein- type bounds without invoking a holographic
    dual theory.

    '
  unlocks: 'Understanding why entropy scales with area rather than volume in gravitational systems (AdS, black holes, de Sitter)
    from a purely bulk field theory perspective, without requiring a boundary holographic theory.

    '
  prerequisites:
