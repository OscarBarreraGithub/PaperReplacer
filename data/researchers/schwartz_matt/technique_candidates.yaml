- technique_id: conformal_metric_jacobian
  label: Conformal Inner Product to Regularize the Dilatation Zero Mode
  description: 'The Jacobian for going from linearized dilatation fluctuations to the collective scale coordinate R is infinite
    because the dilatation mode phi_d is not normalizable under the standard L^2 inner product. Resolve this by diagonalizing
    fluctuations using the operator O = 1/(V''''[phi_b]) (-Delta - 1) instead of S''''[phi_b], which induces the inner product
    <phi_j|phi_k>_V = -int V''''[phi_b] phi_j phi_k. The dilatation mode IS normalizable under this conformal metric, and
    the same basis diagonalizes fluctuations around both the bounce and the false vacuum simultaneously.

    '
  unlocks: 'Gives a finite, well-defined Jacobian for the scale collective coordinate, enabling exact closed-form evaluation
    of functional determinants over scalars, fermions, and gauge bosons around the scale-invariant bounce. This resolves a
    decades-old problem in instanton physics.

    '
  prerequisites:
