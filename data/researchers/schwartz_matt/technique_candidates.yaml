- technique_id: exact_functional_determinants_bounce
  label: Exact Closed-Form Functional Determinants Around the Scale-Invariant Bounce
  description: 'Using the conformal inner product basis (associated Legendre functions on the 4-sphere via stereographic projection),
    compute the ratios det[S''''[phi_b]] / det[S''''[phi_FV]] in closed form for real scalars, complex scalars, Dirac fermions,
    and gauge bosons. For gauge bosons, work in a general Fermi gauge and demonstrate manifest gauge invariance of the final
    result.

    '
  unlocks: 'Eliminates the need for numerical functional-determinant evaluation in tunneling rate calculations for scale-invariant
    theories, and provides the first explicit demonstration that the one-loop tunneling prefactor is gauge invariant for the
    SM-like case.

    '
