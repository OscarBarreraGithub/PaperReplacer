- technique_id: comprehensive_qg_variable_ranking
  label: Systematic Ranking of Quark/Gluon Discriminants via ROC Curves
  description: 'Evaluate hundreds of jet substructure observables across six pT bins (50-1600 GeV) using ROC curves. Rank
    variables by gluon rejection at fixed quark efficiency. Key finding: charged track count is best at high quark efficiency,
    girth/broadening best at low efficiency; combining 2-3 variables via boosted decision trees captures nearly all discrimination
