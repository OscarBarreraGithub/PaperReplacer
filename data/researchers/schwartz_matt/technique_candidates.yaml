- technique_id: llp_weak_supervision_batched
  label: Batched Learning from Label Proportions (LLP) for high-dimensional inputs
  description: 'Modifies the loss function of any trainable classifier to globally match the predicted signal fraction on
    each training batch to the known truth fractions, using either weak MSE or weak cross-entropy loss. Introduces batched
