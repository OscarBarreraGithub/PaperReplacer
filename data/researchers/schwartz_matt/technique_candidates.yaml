- technique_id: factorization_gauge
  label: Factorization gauge (momentum-dependent lightcone reference vector)
  description: 'Define a gauge where the lightcone reference vector r^mu(k) in the gluon propagator depends on the momentum
    k: r = r_s for soft momenta, r = r_j for momenta collinear to jet j, and r = r_h otherwise. This is implemented via a
    non-local gauge-fixing term and gives the freedom to choose different reference vectors for different IR sectors, which
    is essential for the soft-collinear decoupling proof.

    '
  unlocks: 'Enables the loop-level generalization of the tree-level trick of choosing different polarization reference vectors
    for different sectors. With the choice r_s = p_j, all soft-sensitive (red) lines decouple from the j-collinear sector,
    making soft-collinear factorization manifest. This is the key gauge innovation that makes the all-orders proof possible.

    '
  prerequisites:
