  abstract: We advocate a strategy of bootstrapping Feynman integrals from just knowledge of their singular behavior. This
    approach is complementary to other bootstrap programs, which exploit nonperturbative constraints such as unitarity, or
    amplitude-level constraints such as gauge invariance. We begin by studying where a Feynman integral can become singular,
    and the behavior it exhibits near these singularities. We then characterize the space of functions that we expect the
    integral to evaluate to, in order to formulate an appropriate ansatz. Finally, we derive constraints on where each singularity
    can appear in this ansatz, and use information about the expansion of the integral around singular points in order to
    determine the value of all remaining free coefficients. Throughout, we highlight how constraints that have previously
