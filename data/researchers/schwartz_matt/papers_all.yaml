  abstract: 'Infrared divergences have long been heralded to cancel in sufficiently inclusive cross sections, according to
    the famous Kinoshita-Lee-Nauenberg theorem which mandates an initial and final state sum. While well motivated, this theorem
    is much weaker than necessary: for finiteness, one need only sum over initial or final states. Moreover, the cancellation
    generically requires the inclusion of the forward scattering process. We provide a number of examples showing the importance
    of this revised understanding: in e+e-→Z at next-to-leading order, one can sum over certain initial and final states with
    an arbitrary number of extra photons, or only over final states with a finite number of photons, if forward scattering
    is included. For Compton scattering, infrared finiteness requires the indistinguishability of hard forward-scattered electrons
