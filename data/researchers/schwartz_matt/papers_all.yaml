  abstract: Providing a comprehensive introduction to quantum field theory, this textbook covers the development of particle
    physics from its foundations to the discovery of the Higgs boson. Its combination of clear physical explanations, with
    direct connections to experimental data, and mathematical rigor make the subject accessible to students with a wide variety
    of backgrounds and interests. Assuming only an undergraduate-level understanding of quantum mechanics, the book steadily
    develops the Standard Model and state-of-the-art calculation techniques. It includes multiple derivations of many important
    results, with modern methods such as effective field theory and the renormalization group playing a prominent role. Numerous
    worked examples and end-of-chapter problems enable students to reproduce classic results and to master quantum field theory
    as it is used today. Based on a course taught by the author over many years, this book is ideal for an introductory to
    advanced quantum field theory sequence or for independent study.
