  abstract: A method is introduced for distinguishing top jets -- boosted, hadronically decaying top quarks -- from standard
    model backgrounds using jet substructure. The procedure involves parsing the jet cluster to resolve features such as three
    light quark subjets, and then imposing angular and kinematic constraints. This method is much more efficient than simple
    invariant mass cuts or jet clustering with fixed angular size. With top-tagging, high pT dijets can be rejected with an
    efficiency of around 99% while retaining 20-40% of the tops. This allows us to reach into the all-hadronic channel for
    new-physics signals, such as new heavy t-tbar resonances, which ordinarily would be overwhelmed by the enormous dijet
    background. In addition, it will improve the reach for cases when one of the tops decays semi-leptonically, and may also
    have applications to single-top searches and studies of b-tagging efficiency at high pT.
