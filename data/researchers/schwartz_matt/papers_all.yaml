    features of data, but cannot be trusted to capture all of the complex correlations exploitable by modern machine learning
    methods. Recent work in weakly supervised learning has shown that simple, low-dimensional classifiers can be trained using
    only the impure mixtures present in data. Here, we demonstrate that complex, high-dimensional classifiers can also be
