  abstract: Jet grooming algorithms are widely used in experimental analyses at hadron colliders to remove contaminating radiation
    from within jets. While the algorithms perform a great service to the experiments, their intricate algorithmic structure
    and multiple parameters has frustrated precision theoretic understanding. In this paper, we demonstrate that one particular
    groomer called soft drop actually makes precision jet substructure easier. In particular, we derive a factorization formula
    for a large class of soft drop jet substructure observables, including jet mass. The essential observation that allows
    for this factorization is that, without the soft wide-angle radiation groomed by soft drop, all singular contributions
    are collinear. The simplicity and universality of the collinear limit in QCD allows us to show that to all orders, the
    normalized differential cross section has no contributions from non-global logarithms. It is also independent of process,
    up to the relative fraction of quark and gluon jets. In fact, soft drop allows us to define this fraction precisely. The
    factorization theorem also explains why soft drop observables are less sensitive to hadronization than their ungroomed
    counterparts. Using the factorization theorem, we resum the soft drop jet mass to next-to-next-to-leading logarithmic
    accuracy. This requires calculating some clustering effects that are closely related to corresponding effects found in
    jet veto calculations. We match our resummed calculation to fixed order results for both e$^{+}$ e$^{−}$ → dijets and
    pp → Z + j events, producing the first jet substructure predictions (groomed or ungroomed) to this accuracy for the LHC.
