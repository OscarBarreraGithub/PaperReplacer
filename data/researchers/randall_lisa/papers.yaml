  abstract: 'An AdS_4 brane embedded in AdS_5 exhibits the novel feature that a four-dimensional graviton is localized near
    the brane, but the majority of the infinite bulk away from the brane where the warp factor diverges does not see four-dimensional
    gravity. A naive application of the holographic principle from the point of view of the four-dimensional observer would
    lead to a paradox: a global holographic mapping would require infinite entropy density. In this paper, we show that this
