  abstract: It is well known that stable weak scale particles are viable dark matter candidates since the annihilation cross
    section is naturally about the right magnitude to leave the correct thermal residual abundance. Many dark matter searches
    have focused on relatively light dark matter consistent with weak couplings to the Standard Model. However, in a strongly
    coupled theory, or even if the coupling is just a few times bigger than the Standard Model couplings, dark matter can
    have TeV-scale mass with the correct thermal relic abundance. Here we consider neutral TeV-mass scalar dark matter, its
    necessary interactions, and potential signals. We consider signals both with and without higher-dimension operators generated
