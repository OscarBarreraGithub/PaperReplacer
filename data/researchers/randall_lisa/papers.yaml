  abstract: We study the possibility of discovering and measuring the properties of the lightest Kaluza-Klein excitation of
    the gluon in a Randall-Sundrum scenario where the Standard Model matter and gauge fields propagate in the bulk. The KK-gluon
    decays primarily into top quarks. We discuss how to use the $t \bar{t}$ final states to discover and probe the properties
    of the KK-gluon. Identification of highly energetic tops is crucial for this analysis. We show that conventional identification
    methods relying on well separated decay products will not work for heavy resonances but suggest alternative methods for
    top identification for energetic tops. We find, conservatively, that resonances with masses less than 5 TeV can be discovered
    if the algorithm to identify high $p_T$ tops can reject the QCD background by a factor of 10. We also find that for similar
    or lighter masses the spin can be determined and for lighter masses the chirality of the coupling to $t\bar t$ can be
    measured. Since the energetic top pair final state is a generic signature for a large class of new physics as the top
    quark presumably couples most strongly to the electroweak symmetry breaking sector, the methods we have outlined to study
    the properties of the KK-gluon should also be important in other scenarios.
