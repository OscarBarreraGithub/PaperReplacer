  abstract: We propose a new higher-dimensional mechanism for solving the Hierarchy Problem. The Weak scale is generated from
    a large scale of order the Planck scale through an exponential hierarchy. However, this exponential arises not from gauge
    interactions but from the background metric (which is a slice of AdS_5 spacetime). This mechanism relies on the existence
    of only a single additional dimension. We demonstrate a simple explicit example of this mechanism with two three-branes,
    one of which contains the Standard Model fields. The experimental consequences of this scenario are new and dramatic.
    There are fundamental spin-2 excitations with mass of weak scale order, which are coupled with weak scale as opposed to
    gravitational strength to the standard model particles. The phenomenology of these models is quite distinct from that
    of large extra dimension scenarios; none of the current constraints on theories with very large extra dimensions apply.
