    with existing constraints in the up quark sector. We discuss some subtleties in the loop calculation that are similar
    to those in Higgs to \gamma\gamma. Loop-induced dipole operators in warped scenarios and their composite analogs exhibit
    non-trivial dependence on the Higgs profile, with the contributions monotonically decreasing when the Higgs is pushed
    away from the IR brane. We show that the size of the dipole operator quickly saturates as the Higgs profile approaches
    the IR brane, implying small dependence on the precise details of the Higgs profile when it is quasi IR localized. We
