  abstract: Although gravitational waves tend to erase eccentricity of an inspiraling binary system, ellipticity can be generated
    in the presence of surrounding matter. We present a semianalytical method for understanding the eccentricity distribution
    of binary black holes (BHs) in the presence of a supermassive BH in a galactic center. Given a matter distribution, we
    show how to determine the resultant eccentricity analytically in the presence of both tidal forces and evaporation up
