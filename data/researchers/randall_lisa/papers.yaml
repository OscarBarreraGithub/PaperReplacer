  abstract: Most models of inflation have small parameters, either to guarantee sufficient inflation or the correct magnitude
    of the density perturbations. In this paper we show that, in supersymmetric theories with weak scale supersymmetry breaking,
    one can construct viable inflationary models in which the requisite parameters appear naturally in the form of the ratio
