  abstract: We consider a dynamical approach to the cosmological constant. There is a scalar field with a potential whose
    minimum occurs at a generic, but negative, value for the vacuum energy, and it has a non-standard kinetic term whose coefficient
    diverges at zero curvature as well as the standard kinetic term. Because of the divergent coefficient of the kinetic term,
