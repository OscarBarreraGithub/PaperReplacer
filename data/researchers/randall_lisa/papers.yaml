    to gravitational systems. To gain insight into this question, we explore how this story is modified within the context
    of Karch-Randall braneworlds when we allow the asymptotic bath to couple to dynamical gravity. We find that because of
    the inability to separate degrees of freedom by spatial location when defining the radiation region, the entanglement
