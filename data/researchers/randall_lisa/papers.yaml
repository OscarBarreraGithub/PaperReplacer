  abstract: In models in which technicolor induces electroweak symmetry breaking, the relations between electroweak parameters
    will differ from those of the standard model. Even with the most conservative assumption that the only custodial SU(2)
    violating parameters are those in the standard model, there can be measurable corrections to standard model predictions.
    We present an effective field theory useful for calculating corrections to electroweak parameters. We then focus on technicolor
    models, for which we construct the low-energy effective theory and calculate the correction to the W-mass from the pseudo-goldstone
    boson states.
