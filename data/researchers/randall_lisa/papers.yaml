  abstract: We discuss the low energy properties of the invisible axion in an effective field theory language. We study the
    most general model in which the strong CP problem is solved by a Peccei-Quinn symmetry spontaneously broken at a large
    scale. We distinguish carefully between the model dependent derivative couplings of the axion associated with physics
    at the large scale, and the model independent nonderivative couplings that derive from the QCD anomaly. The derivative
    couplings may include flavor changing effects. The effects that produce a nonzero ḡq and a long range force between baryons
    are included in the model independent nonderivative couplings.
