    as well as exploiting theoretical tools that permit exploration of new model building and cosmological possibilities.
    Particularly due to insights from the AdS/CFT correspondence, higher-dimensional warped compactifications, in particular,
    have played a big role in recent developments by allowing a study of regimes of parameters that would otherwise be intractable.
    Similarly, theoretical developments in quantum gravity benefit from the bigger range of possibilities that can be explored
    using warped geometry, allowing for constructions of string vacua with positive cosmological constant and for the exploration
