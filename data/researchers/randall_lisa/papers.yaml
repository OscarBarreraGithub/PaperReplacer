  abstract: Most dark matter models set the dark matter relic density by some interaction with Standard Model particles. Such
    models generally assume the existence of Standard Model particles early on, with the dark matter relic density a later
    consequence of those interactions. Perhaps a more compelling assumption is that dark matter is not part of the Standard
    Model sector and a population of dark matter too is generated at the end of inflation. This democratic assumption about
    initial conditions does not necessarily provide a natural value for the dark matter relic density, and furthermore superficially
    leads to too much entropy in the dark sector relative to ordinary matter. We address the latter issue by the late decay
    of heavy particles produced at early times, thereby associating the dark matter relic density with the lifetime of a long-lived
    state. This paper investigates what it would take for this scenario to be compatible with observations in what we call
    Flooded Dark Matter (FDM) models and discusses several interesting consequences. One is that dark matter can be very light
    and furthermore, light dark matter is in some sense the most natural scenario in FDM as it is compatible with larger couplings
    of the decaying particle. A related consequence is that the decay of the field with the smallest coupling and hence the
    longest lifetime dominates the entropy and possibly the matter content of the Universe, a principle we refer to as “Maximum
    Baroqueness”. We also demonstrate that the dark sector should be colder than the ordinary sector, relaxing the most stringent
    free-streaming constraints on light dark matter candidates. We will discuss the potential implications for the core-cusp
    problem in a follow-up paper. The FDM framework will furthermore have interesting baryogenesis implications. One possibility
    is that dark matter is like the baryon asymmetry and both are simultaneously diluted by a late entropy dump. Alternatively,
    FDM is compatible with an elegant non-thermal leptogenesis implementation in which decays of a heavy right-handed neutrino
    lead to late time reheating of the Standard Model degrees of freedom and provide suitable conditions for creation of a
