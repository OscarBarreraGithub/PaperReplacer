  abstract: Supersymmetric models in singular extra dimensional spaces feature prominently in many interesting phenomenological
    models, including those derived from string theory. In this paper we explicitly derive the low energy theory of phenomenologically
    viable supersymmetric theories in five dimensions, and highlight several aspects of these models that are not obvious
    from working solely in the 4d effective theory. Important deviations arise for anomaly mediation, which is purported to
    be a predictive mechanism to mediate supersymmetry (SUSY) breaking that is naturally most relevant in extra dimensional
    theories. Despite this, most analyses of anomaly mediation have been performed in the 4d effective theory. We fill this
    gap in the literature by constructing stabilized supersymmetric theories in 5d and studying supersymmetry breaking and
    anomaly mediation. Studying Sequestered Conformal Anomaly-Mediated (SCAM) in full generality reveals important deviations
    from the 4d EFT expectations, particularly for the role of boundary superpotentials, the radion and the predicted universality
    of anomaly mediation. We discuss the requirements for viable extra dimensional models of SUSY-breaking, and demonstrate
    when and how the anomaly-mediated masses in 5d reduce to the naıve 4d supersymmetric result. In many cases supersymmetry
    is necessarily broken at the 5d level, leading to anomaly-mediated and other supersymmetry breaking masses that are not
    derivable in a simple supersymmetric 4d EFT, but need to be included as matching corrections. We comment on the potential
    implications of our methods for phenomenology and singular higher-dimensional constructions, such as the KKLT scenario.
