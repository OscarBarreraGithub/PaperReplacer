    of a starting point of inflation. The background evolution is driven by the fast roll of the radion at early times and
    the slow roll of the inflaton at late times. We find that the action has the form of a two-field hyperbolic inflation
    model, the two fields being the radion and the inflaton, both of which have a time-dependent background solution. This
    setup is holographically dual to an inflaton coupled to a strongly coupled confined sector in which the confinement scale
    is larger than the Hubble scale, and a confinement scale whose ratio to the 4D Planck scale evolves cosmologically. Focusing
    on the period when the equation of state becomes that of inflation, we find that the presence of the IR brane leads to
    deviations from the approximate de Sitter background in addition to those from the slow-roll parameters of the inflaton
    potential. We quantify the effect of the presence of the IR brane on the two point function of the adiabatic scalar perturbations
    and tensor perturbations. The dominant deviations occur at large scales: the adiabatic power spectrum has a blue tilt,
    while the tensor power spectrum shows oscillatory features. We present numerical fits to the shape of the adiabatic power
    spectrum, and discuss the implications for cosmic microwave background (CMB) analysis.'
