  abstract: Recently the LHCb collaboration reported evidence for direct CP violation in charm decays. The value is sufficiently
    large that either substantially enhanced Standard Model contributions or non-Standard Model physics is required to explain
    it. In the latter case only a limited number of possibilities would be consistent with other existing flavor-changing
    constraints. We show that warped extra dimensional models that explain the quark spectrum through flavor anarchy can naturally
    give rise to contributions of the size required to explain the the LHCb result. The D meson asymmetry arises through a
