contract_version: "0.1"
batch_id: "qed_tree_level_processes"
description: "Stage 3 first-pass batch for QED exemplar processes and process-sensitive results in the scattering neighborhood."

context:
  audience_profile: "hep_th_grad"
  subfield: "qft_backbone"
  task_type: "standard_computation"

allowed_relations:
  - "requires_for_recognize"
  - "requires_for_use"
  - "requires_for_derive"
  - "part_of"

allowed_overlay_types:
  - "assumed_background"

mastery_modes:
  - "recognize"
  - "use"
  - "derive"

closure:
  allow_transitive_dependency: true
  allow_heterogeneous_composition: false
  cross_partonomy: false
  cross_context: false
  exclude_statuses:
    - "disputed"

composition:
  allowed_relation_chains:
    - ["requires_for_recognize", "requires_for_recognize"]
    - ["requires_for_use", "requires_for_use"]
    - ["requires_for_derive", "requires_for_derive"]
  necessity_propagation: "min"
  confidence_propagation: "min"

query_defaults:
  expand_composites_default: false
  prerequisite_set_semantics: "ancestral_frontier"
  disclose_non_uniqueness: true

autonomy:
  auto_merge_enabled: true
  minimum_confidence_for_auto_merge: 0.83
  block_on_duplicate_risk: true
  block_on_ontology_drift: true
  block_on_query_warning: true
  require_human_review_for:
    - "contract_changes"
    - "ontology_changes"
    - "decomposition_changes"
    - "disputed_items"
    - "forbidden_heuristics"
    - "ambiguous_overlap"

query_suite:
  - "prereqs_recognize"
  - "prereqs_use"
  - "prereqs_derive"
  - "intrinsic_vs_profile_adjusted"
  - "expanded_slice"

forbidden_heuristics:
  - "pedagogical_edges_in_prerequisite_queries"
  - "global_assumed_background"
  - "broad_qft_umbrella_nodes_without_need"
  - "broad_qed_umbrella_nodes_without_need"
  - "generic_cross_section_machinery_without_need"
  - "duplicate_scattering_root_nodes"
  - "shortest_path_presented_as_pedagogy"
